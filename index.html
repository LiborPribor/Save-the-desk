<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - SOCIAL ECO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: rgba(15,15,15,0.9); backdrop-filter: blur(15px); border-radius: 12px; border: 1px solid #444; padding: 10px; pointer-events: auto; }
        #top-row { display: flex; gap: 10px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #ff00ff; }
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: 900; color: #ff00ff; display: block; }
        .moves-count { color: #00ff00 !important; text-shadow: 0 0 10px rgba(0,255,0,0.5); }

        /* Vstupní obrazovka / Návod */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .login-box { text-align: center; width: 90%; max-width: 400px; padding: 25px; border: 1px solid #ff00ff; }
        .login-input { background: #111; border: 1px solid #444; padding: 12px; border-radius: 8px; color: #fff; width: 100%; margin-bottom: 20px; box-sizing: border-box; text-align: center; font-size: 16px; }
        .rules-box { text-align: left; font-size: 11px; color: #ccc; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 3px solid #ff00ff; }
        
        #side-menu { position: absolute; top: 0; left: -100%; width: 85%; height: 100%; background: #0a0a0a; z-index: 100; transition: 0.3s; padding: 40px 20px; pointer-events: auto; border-right: 1px solid #ff00ff; box-sizing: border-box; overflow-y: auto; }
        #side-menu.open { left: 0; }
        .friend-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .friend-row.me { background: rgba(255, 0, 255, 0.1); border-radius: 5px; color: #ff00ff; }

        #result-container { margin-top: 10px; text-align: center; display: none; pointer-events: auto; }
        #score-display { font-size: 60px; font-weight: 900; color: #ff00ff; }
        .btn { border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-challenge { background: #ff00ff; color: #fff; box-shadow: 0 0 15px rgba(255,0,255,0.4); }
        .btn-ok { background: #333; color: #fff; }

        #reference-box { position: absolute; top: 130px; right: 20px; width: 65px; height: 65px; border: 1px solid #ff00ff; border-radius: 10px; }
        #refCanvas { width: 55px; height: 55px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box glass-panel">
        <h1 style="color:#ff00ff; margin:0 0 10px 0;">NEON KNOT</h1>
        <input type="text" id="player-name-input" class="login-input" placeholder="Tvé jméno..." maxlength="12">
        
        <div class="rules-box">
            <b>JAK HRÁT:</b><br>
            • Obtáhni neonový tvar jedním tahem.<br>
            • <b>PŘESNOST:</b> Trefuj špičky a drž linii.<br>
            • <b>BONUSY:</b> Každých 20 dní v kuse = +1 tah navždy.<br>
            • <b>SOCIÁLNÍ:</b> Pozvi kámoše a získej tah za každého, kdo začne hrát!
        </div>
        <button class="btn btn-challenge" style="width:100%" onclick="savePlayerName()">HRÁT</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="side-menu">
    <div style="text-align:right; font-size:28px;" onclick="toggleMenu()">✕</div>
    <h2 id="menu-user-name" style="color:#ff00ff; margin-bottom: 5px;">Hráč</h2>
    <div id="menu-status" style="font-size:12px; color:#00ff00; margin-bottom:20px;">Tahů: <span class="m-count">0</span></div>
    
    <button class="btn btn-challenge" style="width:100%; margin-bottom: 25px;" onclick="shareGame('Vyzývám tě do Neon Knot!')">VYZVAT PŘÍTELE (+1 TAH)</button>
    
    <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px;">Žebráček přátel</div>
    <div id="friends-list"></div>
</div>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="toggleMenu()">☰</div>
        <div id="stats-bar" class="glass-panel">
            <div class="stat-item"><span class="stat-label">Tahy</span><span id="moves-display" class="stat-value moves-count">0</span></div>
            <div class="stat-item"><span class="stat-label">Best</span><span id="best-display" class="stat-value">0%</span></div>
            <div class="stat-item"><span class="stat-label">Řada</span><span id="streak-display" class="stat-value">🔥 0</span></div>
        </div>
    </div>

    <div id="result-container" class="glass-panel">
        <div id="score-display">0%</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-ok" onclick="resetBoard()">Znovu</button>
            <button class="btn btn-challenge" onclick="shareGame('Tenhle pokus musíš vidět!')">Sdílet / Vyzvat</button>
        </div>
    </div>

    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const urlParams = new URLSearchParams(window.location.search);
    const referrer = urlParams.get('ref');

    let userId = localStorage.getItem('neon_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);
    
    let userName = localStorage.getItem('neon_name');
    let moves = parseInt(localStorage.getItem('neon_moves') || '5');
    let bestScore = 0;
    let streak = 0;

    if (userName) {
        document.getElementById('login-overlay').style.display = 'none';
        initGame();
    }

    function savePlayerName() {
        const name = document.getElementById('player-name-input').value.trim();
        if (name.length > 1) {
            userName = name;
            localStorage.setItem('neon_name', name);
            document.getElementById('login-overlay').style.display = 'none';
            
            // Bonus za referal
            if (referrer && referrer !== userId) {
                db.ref(`users/${referrer}/moves`).transaction(m => (m || 0) + 1);
                moves += 2; // Sám dostane 2 do začátku
            }

            db.ref(`users/${userId}`).update({ name: userName, moves: moves });
            initGame();
        }
    }

    function initGame() {
        document.getElementById('menu-user-name').innerText = userName;
        
        // Sync s DB
        db.ref(`users/${userId}`).on('value', snap => {
            const data = snap.val() || {};
            moves = data.moves !== undefined ? data.moves : moves;
            bestScore = data.bestScore || 0;
            streak = data.streak || 0;
            updateUI();
        });

        // Žebráček s "Me" logikou
        db.ref('users').orderByChild('bestScore').limitToLast(10).on('value', snap => {
            const users = snap.val();
            let list = [];
            for (let id in users) list.push({ ...users[id], id: id });
            list.sort((a,b) => b.bestScore - a.bestScore);
            
            let html = '';
            list.forEach(u => {
                const isMe = u.id === userId ? 'me' : '';
                html += `<div class="friend-row ${isMe}"><span>${u.name}</span><b>${u.bestScore}%</b></div>`;
            });
            document.getElementById('friends-list').innerHTML = html;
        });

        checkStreak();
    }

    function updateUI() {
        document.getElementById('moves-display').innerText = moves;
        document.querySelectorAll('.m-count').forEach(el => el.innerText = moves);
        document.getElementById('best-display').innerText = bestScore + "%";
        document.getElementById('streak-display').innerText = "🔥 " + streak;
        localStorage.setItem('neon_moves', moves);
    }

    function checkStreak() {
        const today = new Date().toDateString();
        const last = localStorage.getItem('last_play');
        if (last !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
            streak = (last === yesterday.toDateString()) ? (streak + 1) : 1;
            localStorage.setItem('last_play', today);
            db.ref(`users/${userId}/streak`).set(streak);
            if (streak % 20 === 0) {
                 // Trvalý bonus k tahům by se řešil v logice resetu, zde přidáme jednorázově
                 db.ref(`users/${userId}/moves`).transaction(m => (m || 0) + 5);
            }
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    let playerTrace = [], isDrawing = false, isFinished = false;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    canvas.addEventListener('touchstart', e => {
        if (isFinished || moves <= 0) return;
        isDrawing = true; playerTrace = [];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ff'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    });

    canvas.addEventListener('touchend', () => {
        if (isDrawing && playerTrace.length > 15) {
            moves--;
            db.ref(`users/${userId}/moves`).set(moves);
            evaluate();
        }
        isDrawing = false;
    });

    // --- TVÁ NEDOTKNUTELNÁ LOGIKA ---
    function evaluate() {
        isFinished = true;
        let minX = Math.min(...playerTrace.map(p=>p.x)), maxX = Math.max(...playerTrace.map(p=>p.x));
        let minY = Math.min(...playerTrace.map(p=>p.y)), maxY = Math.max(...playerTrace.map(p=>p.y));
        let drawW = maxX - minX, drawH = maxY - minY;
        if (drawW < 80 || drawH < 80) { showScore(0); return; }

        let size = Math.max(drawW, drawH, 50);
        let centerX = minX + drawW / 2;
        let centerY = minY + drawH / 2;
        const normPlayer = playerTrace.map(p => ({ x: ((p.x - centerX) / size) * 80 + 50, y: ((p.y - centerY) / size) * 80 + 50 }));

        let totalErr = 0;
        normPlayer.forEach(p => {
            let minDist = Infinity;
            for(let i=0; i<targetShape.length-1; i++) {
                let d = distToSegment(p, targetShape[i], targetShape[i+1]);
                if (d < minDist) minDist = d;
            }
            totalErr += minDist;
        });
        let avgErr = totalErr / normPlayer.length;
        const corners = [{x:50,y:10}, {x:85,y:40}, {x:50,y:95}, {x:15,y:40}];
        let cornersHit = 0;
        corners.forEach(c => { if (normPlayer.some(p => Math.hypot(p.x - c.x, p.y - c.y) < 14)) cornersHit++; });
        let distances = normPlayer.map(p => Math.hypot(p.x - 50, p.y - 50));
        let maxR = Math.max(...distances), minR = Math.min(...distances);
        let radiusVariance = maxR - minR;

        let score = 100 - (avgErr * 12);
        if (cornersHit < 4) score *= 0.4;
        if (radiusVariance < 15) score *= 0.2;
        if (avgErr > 10) score *= 0.5;

        let finalScore = Math.round(Math.max(0, score));
        showScore(finalScore);

        // ČÁRKOVANÝ DUCH
        ctx.setLineDash([8, 8]); ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)'; ctx.lineWidth = 2; ctx.shadowBlur = 0;
        ctx.beginPath();
        targetShape.forEach((p, i) => {
            let rx = ((p.x - 50) / 80) * size + centerX;
            let ry = ((p.y - 50) / 80) * size + centerY;
            i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
        });
        ctx.stroke(); ctx.setLineDash([]);

        // Podpis pro sdílení
        ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
        ctx.fillText(userName.toUpperCase() + " • " + finalScore + "%", canvas.width/2, canvas.height - 40);
    }

    function distToSegment(p, v, w) {
        let l2 = Math.hypot(v.x - w.x, v.y - w.y)**2;
        if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function showScore(s) {
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('score-display').innerText = s + "%";
        if (s > bestScore) db.ref(`users/${userId}/bestScore`).set(s);
    }

    function resetBoard() {
        if(moves <= 0) { alert("Nemáš tahy! Pozvi kámoše nebo počkej do zítra."); return; }
        ctx.clearRect(0,0,canvas.width, canvas.height);
        document.getElementById('result-container').style.display = 'none';
        isFinished = false;
    }

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    function drawRef() {
        const r = document.getElementById('refCanvas').getContext('2d');
        r.clearRect(0,0,200,200); r.strokeStyle='#ff00ff'; r.lineWidth=12; r.lineCap='round';
        r.beginPath(); r.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => r.lineTo(p.x*2, p.y*2)); r.stroke();
    }
    drawRef();

    async function shareGame(msg) {
        const shareUrl = window.location.origin + window.location.pathname + '?ref=' + userId;
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        const file = new File([blob], 'neon_knot.png', { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({
                title: 'Neon Knot Challenge',
                text: `${msg} Dal jsem ${bestScore}%. Zkus to taky a oba dostaneme tah navíc!`,
                url: shareUrl,
                files: [file]
            });
        } else {
            prompt("Kopíruj odkaz (tah navíc za každého kámoše!):", shareUrl);
        }
    }
</script>
</body>
</html>
