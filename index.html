<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON TRACE - MASTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #fff; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; box-sizing: border-box; }
        #header { text-align: center; margin-top: 20px; }
        #score { font-size: 42px; font-weight: 900; text-shadow: 0 0 20px #fff; opacity: 0; transition: opacity 0.3s; transform: scale(0.8); }
        #score.show { opacity: 1; transform: scale(1); }
        
        #reference-box { position: absolute; top: 30px; right: 20px; width: 90px; height: 90px; border: 2px solid #00ffcc; border-radius: 15px; background: rgba(0, 255, 204, 0.05); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); display: flex; justify-content: center; align-items: center; }
        #refCanvas { width: 70px; height: 70px; }
        
        #footer { text-align: center; margin-bottom: 40px; }
        #instr { font-size: 16px; letter-spacing: 2px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.4; transform: scale(0.98); } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="header">
        <div id="score">0%</div>
        <div id="reference-box">
            <canvas id="refCanvas" width="140" height="140"></canvas>
        </div>
    </div>
    <div id="footer">
        <div id="instr">OBKRESLI SYMBOL JEDNÍM TAHEM</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const refCanvas = document.getElementById('refCanvas');
    const refCtx = refCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const instrEl = document.getElementById('instr');
    
    let playerTrace = [];
    let isDrawing = false;
    let targetShapePoints = [];
    const targetColor = '#00ffcc';

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        clearMainCanvas();
        drawReferenceToMain();
    }
    window.addEventListener('resize', resize);

    // Definice čtverce (body od 0 do 100)
    function defineTargetShape() {
        targetShapePoints = [
            { x: 20, y: 20 }, { x: 80, y: 20 },
            { x: 80, y: 80 }, { x: 20, y: 80 },
            { x: 20, y: 20 }
        ];
    }

    function drawReferenceToUI() {
        refCtx.clearRect(0, 0, refCanvas.width, refCanvas.height);
        refCtx.strokeStyle = targetColor;
        refCtx.lineWidth = 6;
        refCtx.lineCap = 'round';
        refCtx.lineJoin = 'round';
        refCtx.shadowBlur = 10;
        refCtx.shadowColor = targetColor;
        
        const s = 1.4; // Scale pro 140px canvas
        refCtx.beginPath();
        refCtx.moveTo(targetShapePoints[0].x * s, targetShapePoints[0].y * s);
        for (let i = 1; i < targetShapePoints.length; i++) {
            refCtx.lineTo(targetShapePoints[i].x * s, targetShapePoints[i].y * s);
        }
        refCtx.stroke();
    }

    function drawReferenceToMain() {
        const size = Math.min(canvas.width, canvas.height) * 0.6;
        const offsetX = (canvas.width - size) / 2;
        const offsetY = (canvas.height - size) / 2;
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        ctx.moveTo(targetShapePoints[0].x * (size/100) + offsetX, targetShapePoints[0].y * (size/100) + offsetY);
        for (let i = 1; i < targetShapePoints.length; i++) {
            ctx.lineTo(targetShapePoints[i].x * (size/100) + offsetX, targetShapePoints[i].y * (size/100) + offsetY);
        }
        ctx.stroke();
    }

    // --- OVLÁDÁNÍ (FIXED) ---
    function handleStart(e) {
        e.preventDefault();
        isDrawing = true;
        playerTrace = [];
        const t = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        addPoint(t.clientX - rect.left, t.clientY - rect.top);
        
        instrEl.style.display = 'none';
        scoreEl.classList.remove('show');
        clearMainCanvas();
        drawReferenceToMain();
    }

    function handleMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        addPoint(t.clientX - rect.left, t.clientY - rect.top);
        drawPlayerTrace();
    }

    function handleEnd(e) {
        if (!isDrawing) return;
        isDrawing = false;
        evaluateTrace();
    }

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd, { passive: false });
    // Podpora pro myš (testování na PC)
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    function addPoint(x, y) {
        playerTrace.push({ x: x, y: y });
    }

    function clearMainCanvas() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawPlayerTrace() {
        if (playerTrace.length < 2) return;
        ctx.shadowBlur = 15;
        ctx.shadowColor = targetColor;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        ctx.moveTo(playerTrace[playerTrace.length - 2].x, playerTrace[playerTrace.length - 2].y);
        ctx.lineTo(playerTrace[playerTrace.length - 1].x, playerTrace[playerTrace.length - 1].y);
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    function evaluateTrace() {
        if (playerTrace.length < 10) return;
        
        const size = Math.min(canvas.width, canvas.height) * 0.6;
        const offsetX = (canvas.width - size) / 2;
        const offsetY = (canvas.height - size) / 2;

        let targetAbsPoints = targetShapePoints.map(p => ({
            x: p.x * (size/100) + offsetX,
            y: p.y * (size/100) + offsetY
        }));

        let totalDist = 0;
        for (let pTrace of playerTrace) {
            let minDist = Infinity;
            // Hrubé porovnání s body úseček reference
            for (let i = 0; i < targetAbsPoints.length - 1; i++) {
                const d = distToSegment(pTrace, targetAbsPoints[i], targetAbsPoints[i+1]);
                if (d < minDist) minDist = d;
            }
            totalDist += minDist;
        }

        const avgDist = totalDist / playerTrace.length;
        let scorePercent = Math.max(0, 100 - (avgDist * 1.5));
        
        // Bonus za dokončení celého tvaru (jednoduchá kontrola délky)
        if (playerTrace.length < 30) scorePercent *= 0.5;

        scoreEl.innerText = scorePercent.toFixed(0) + '%';
        scoreEl.style.color = scorePercent > 70 ? '#00ffcc' : '#ff0055';
        scoreEl.classList.add('show');
        instrEl.innerText = 'Zkus to znovu!';
        instrEl.style.display = 'block';

        if (navigator.vibrate) navigator.vibrate(scorePercent > 70 ? 50 : 200);
    }

    // Pomocná matika pro vzdálenost bodu od úsečky
    function distToSegment(p, v, w) {
        const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
        if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    defineTargetShape();
    resize();
    drawReferenceToUI();
</script>
</body>
</html>
