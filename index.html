<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON CHALLENGE - DAILY KNOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        #header { display: flex; flex-direction: column; gap: 10px; margin-top: env(safe-area-inset-top); pointer-events: auto; }
        .glass-panel { background: rgba(20,20,20,0.8); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid #333; padding: 12px; }
        
        #stats-bar { display: flex; justify-content: space-between; align-items: center; }
        .stat-value { font-size: 18px; font-weight: 900; color: #ff00ff; display: block; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }

        #score-display { font-size: 80px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #ff00ff; display: none; }
        #overlay-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: auto; width: 80%; }
        
        .btn { background: #ff00ff; color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; pointer-events: auto; }
        .btn-invite { background: #00ffcc; margin-top: 5px; font-size: 12px; }

        #chart-container { width: 100%; height: 100px; margin-bottom: env(safe-area-inset-bottom); pointer-events: auto; }
        
        #ref-container { position: absolute; top: 150px; right: 20px; width: 70px; height: 70px; border: 1px solid #ff00ff; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="header">
        <div class="glass-panel" id="stats-bar">
            <div><span class="stat-label">Uživatel</span><span id="display-name" class="stat-value">...</span></div>
            <div><span class="stat-label">Denní řada</span><span id="streak-val" class="stat-value">0 dní</span></div>
            <div><span class="stat-label">Dnešní tahy</span><span id="attempts-left" class="stat-value">1/1</span></div>
        </div>
        <button class="btn btn-invite" onclick="inviteFriend()">➕ Vyzvat kamaráda (Bonus tah)</button>
    </div>

    <div id="score-display">0%</div>

    <div id="overlay-msg">
        <h2 id="msg-text">Načítání...</h2>
        <div id="msg-sub"></div>
    </div>

    <div id="chart-container" class="glass-panel">
        <canvas id="progressChart"></canvas>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userId = localStorage.getItem('neon_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);

    let userName = localStorage.getItem('neon_name');
    let attemptsToday = 0;
    let maxAttempts = 1;
    let lastDate = localStorage.getItem('neon_last_date');

    // --- LOGIKA PŘIHLÁŠENÍ ---
    if (!userName) {
        userName = prompt("Zadej své jméno pro žebříček:");
        if(!userName) userName = "Hráč";
        localStorage.setItem('neon_name', userName);
    }
    document.getElementById('display-name').innerText = userName;

    // --- KONTROLA POZVÁNKY ---
    const urlParams = new URLSearchParams(window.location.search);
    const inviterId = urlParams.get('ref');
    if (inviterId && inviterId !== userId) {
        db.ref(`users/${inviterId}/bonus`).transaction(c => (c || 0) + 1);
        db.ref(`users/${inviterId}/alerts`).push(`${userName} se připojil! Máš +1 tah.`);
    }

    // --- SYNCHRONIZACE S DB ---
    db.ref(`users/${userId}`).on('value', snap => {
        const data = snap.val() || {};
        const today = new Date().toLocaleDateString();
        
        // Reset tahů pokud je nový den
        if (lastDate !== today) {
            attemptsToday = 0;
            localStorage.setItem('neon_last_date', today);
        } else {
            attemptsToday = data.usedToday || 0;
        }

        maxAttempts = 1 + (data.bonus || 0);
        document.getElementById('attempts-left').innerText = `${maxAttempts - attemptsToday}/${maxAttempts}`;
        document.getElementById('streak-val').innerText = (data.streak || 0) + " dní";
        
        checkAvailability();
    });

    // Upozornění na bonusy
    db.ref(`users/${userId}/alerts`).on('child_added', snap => {
        alert("BONUS: " + snap.val());
        snap.ref.remove();
    });

    function checkAvailability() {
        const overlay = document.getElementById('overlay-msg');
        if (attemptsToday >= maxAttempts) {
            overlay.style.display = "block";
            document.getElementById('msg-text').innerText = "Dnešní limit vyčerpán";
            document.getElementById('msg-sub').innerText = "Další tah zítra nebo za pozvání kamaráda.";
        } else {
            overlay.style.display = "none";
        }
    }

    function inviteFriend() {
        const link = window.location.origin + window.location.pathname + "?ref=" + userId;
        navigator.clipboard.writeText(link);
        alert("Odkaz zkopírován! Pošli ho kamarádovi. Když zahraje, dostaneš tah navíc.");
    }

    // --- HERNÍ LOGIKA (Zkráceno pro přehlednost, použij svůj evaluate z minula) ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let playerTrace = [];
    let isDrawing = false;

    canvas.addEventListener('touchstart', (e) => {
        if (attemptsToday >= maxAttempts) return;
        isDrawing = true;
        playerTrace = [{x: e.touches[0].clientX, y: e.touches[0].clientY}];
        ctx.clearRect(0,0,canvas.width, canvas.height);
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const t = e.touches[0];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
        ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    });

    canvas.addEventListener('touchend', () => {
        if (!isDrawing) return;
        isDrawing = false;
        finishTurn(Math.floor(Math.random() * 100)); // Tady bude tvůj výpočet %
    });

    function finishTurn(score) {
        attemptsToday++;
        db.ref(`users/${userId}`).update({
            usedToday: attemptsToday,
            lastScore: score,
            name: userName
        });
        document.getElementById('score-display').innerText = score + "%";
        document.getElementById('score-display').style.display = "block";
        setTimeout(() => { location.reload(); }, 3000);
    }

    // Inicializace grafu a rozměrů (stejné jako minule)
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

</script>
</body>
</html>
