<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - TEST MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        .glass-panel { background: rgba(15,15,15,0.9); backdrop-filter: blur(15px); border-radius: 12px; border: 1px solid #444; padding: 10px; pointer-events: auto; }
        #top-row { display: flex; gap: 10px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #ff00ff; }
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }

        .stat-item { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: 900; color: #ff00ff; display: block; }
        #lvl-badge { background: #ff00ff; color: #000; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }

        #score-display { font-size: 90px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #ff00ff; opacity: 0; transition: 0.4s; }
        #score-display.show { opacity: 1; transform: scale(1.1); }

        #side-menu { position: absolute; top: 0; left: -100%; width: 85%; height: 100%; background: #0a0a0a; z-index: 100; transition: 0.3s; padding: 40px 20px; pointer-events: auto; border-right: 1px solid #ff00ff; box-sizing: border-box; overflow-y: auto; }
        #side-menu.open { left: 0; }
        .user-header { font-size: 24px; font-weight: 900; color: #ff00ff; margin-bottom: 5px; }
        .menu-title { color: #888; font-size: 12px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 25px; margin-bottom: 10px; text-transform: uppercase; }
        .friend-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #111; font-size: 14px; }
        
        .btn-invite { background: #00ffcc; color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        
        #reference-box { position: absolute; top: 130px; right: 20px; width: 80px; height: 80px; border: 1px solid #ff00ff; border-radius: 10px; background: rgba(255,0,255,0.05); display: flex; justify-content: center; align-items: center; }
        #refCanvas { width: 65px; height: 65px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="side-menu">
    <div style="text-align:right; font-size:28px; margin-bottom: 10px;" onclick="toggleMenu()">✕</div>
    
    <div class="stat-label">Testovací režim:</div>
    <div class="user-header" id="menu-user-name">...</div>
    <div id="streak-info" style="font-size: 12px; color: #ff00ff;">🔥 Streak: 0 dní</div>

    <div class="menu-title">ŽEBŘÍČEK KAMARÁDŮ</div>
    <div id="friends-list"><div style="color:#666; font-size:12px;">Načítám...</div></div>

    <div class="menu-title">INFO</div>
    <div style="font-size:11px; color: #00ffcc;">AKTIVNÍ NEOMEZENÉ TESTOVÁNÍ</div>

    <button class="btn-invite" onclick="shareGame()">📤 POZVAT A TESTOVAT</button>
</div>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="toggleMenu()">☰</div>
        <div id="stats-bar" class="glass-panel">
            <div class="stat-item"><span class="stat-label">Best</span><span id="all-time-best" class="stat-value">0%</span></div>
            <div class="stat-item"><span id="lvl-badge">LVL 1</span></div>
            <div class="stat-item"><span class="stat-label">Tahy</span><span id="attempts-left" class="stat-value">∞</span></div>
        </div>
    </div>

    <div id="score-display">0%</div>

    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const userId = localStorage.getItem('neon_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);
    let userName = localStorage.getItem('neon_name') || prompt("Tvé jméno pro testy:") || "Tester";
    localStorage.setItem('neon_name', userName);
    document.getElementById('menu-user-name').innerText = userName;

    const todayStr = new Date().toISOString().split('T')[0];
    let bestEver = 0;

    // Oboustranné přátelství (vylepšené)
    const urlParams = new URLSearchParams(window.location.search);
    const refId = urlParams.get('ref');
    if (refId && refId !== userId) {
        db.ref(`users/${refId}/friends/${userId}`).set(userName);
        db.ref(`users/${refId}/name`).once('value', n => {
            db.ref(`users/${userId}/friends/${refId}`).set(n.val() || "Přítel");
        });
    }

    db.ref(`users/${userId}`).on('value', snap => {
        const data = snap.val() || {};
        bestEver = data.bestScore || 0;
        document.getElementById('all-time-best').innerText = bestEver + "%";
        document.getElementById('lvl-badge').innerText = "LVL " + (Math.floor(bestEver / 10) + 1);
        document.getElementById('streak-info').innerText = `🔥 Streak: ${data.streak || 0} dní`;

        if (data.friends) {
            const fList = document.getElementById('friends-list');
            fList.innerHTML = "";
            Object.keys(data.friends).forEach(fId => {
                db.ref(`users/${fId}`).once('value', fs => {
                    const fData = fs.val() || {};
                    fList.innerHTML += `<div class="friend-row"><span>${fData.name || 'Hráč'}</span><b>${fData.bestScore || 0}%</b></div>`;
                });
            });
        }
    });

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

    async function shareGame() {
        const shareData = {
            title: 'NEON KNOT',
            text: `Testovací výzva! Můj rekord je ${bestEver}%. Dáš víc?`,
            url: window.location.origin + window.location.pathname + "?ref=" + userId
        };
        try { await navigator.share(shareData); } catch (err) {
            navigator.clipboard.writeText(shareData.url);
            alert("Odkaz zkopírován!");
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:80,y:40},{x:50,y:50},{x:20,y:60},{x:50,y:90},{x:80,y:60},{x:50,y:50},{x:20,y:40},{x:50,y:10}];
    let playerTrace = [], isDrawing = false;

    canvas.addEventListener('touchstart', e => {
        isDrawing = true; playerTrace = [{x:e.touches[0].clientX, y:e.touches[0].clientY}];
        ctx.clearRect(0,0,canvas.width, canvas.height);
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff';
        ctx.beginPath();
        ctx.moveTo(playerTrace[playerTrace.length-1].x, playerTrace[playerTrace.length-1].y);
        ctx.lineTo(t.clientX, t.clientY);
        ctx.stroke();
        playerTrace.push({x:t.clientX, y:t.clientY});
    });

    canvas.addEventListener('touchend', () => { 
        if(!isDrawing || playerTrace.length < 5) return; isDrawing = false;
        const norm = normalize(playerTrace);
        let diff = 0, samples = 50;
        for(let i=0; i<samples; i++) {
            let p = norm[Math.floor((i/(samples-1))*(norm.length-1))];
            let t = targetShape[Math.floor((i/(samples-1))*(targetShape.length-1))];
            diff += Math.hypot(p.x - t.x, p.y - t.y);
        }
        let finalScore = Math.round(Math.max(0, 100 - (diff/samples)*2.4));
        
        drawGhost(playerTrace);
        animateScore(finalScore);

        // Uložení dat i v testu (pro kontrolu databáze)
        db.ref(`users/${userId}/history/${todayStr}`).push(finalScore);
        db.ref(`users/${userId}/name`).set(userName);
        if(finalScore > bestEver) db.ref(`users/${userId}/bestScore`).set(finalScore);

        setTimeout(() => {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            document.getElementById('score-display').classList.remove('show');
        }, 3500);
    });

    function animateScore(target) {
        let current = 0;
        const el = document.getElementById('score-display');
        el.classList.add('show');
        const interval = setInterval(() => {
            el.innerText = current + "%";
            if(current >= target) {
                clearInterval(interval);
                el.style.textShadow = "0 0 50px #fff, 0 0 20px #ff00ff";
            }
            current++;
        }, 15);
    }

    function drawGhost(pts) {
        let minX = Math.min(...pts.map(p=>p.x)), maxX = Math.max(...pts.map(p=>p.x));
        let minY = Math.min(...pts.map(p=>p.y)), maxY = Math.max(...pts.map(p=>p.y));
        let s = Math.max(maxX-minX, maxY-minY, 1);
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        targetShape.forEach((p, i) => {
            let rx = (p.x-10)/80 * s + minX;
            let ry = (p.y-10)/80 * s + minY;
            if(i===0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
        });
        ctx.stroke();
    }

    function normalize(pts) {
        let minX = Math.min(...pts.map(p=>p.x)), maxX = Math.max(...pts.map(p=>p.x));
        let minY = Math.min(...pts.map(p=>p.y)), maxY = Math.max(...pts.map(p=>p.y));
        let s = Math.max(maxX-minX, maxY-minY, 1);
        return pts.map(p => ({ x:(p.x-minX)/s*80+10, y:(p.y-minY)/s*80+10 }));
    }

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawRef(); });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    function drawRef() {
        const r = document.getElementById('refCanvas').getContext('2d');
        r.clearRect(0,0,200,200); r.strokeStyle='#ff00ff'; r.lineWidth=10; r.lineCap='round';
        r.beginPath(); r.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => r.lineTo(p.x*2, p.y*2)); r.stroke();
    }
    drawRef();
</script>
</body>
</html>
