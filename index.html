<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON EYE - DRAW BY SIGHT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: #fff; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; }
        #score { font-size: 60px; font-weight: 900; text-align: center; text-shadow: 0 0 20px #fff; opacity: 0; transition: 0.3s; }
        #score.show { opacity: 1; }
        #reference-box { position: absolute; top: 20px; right: 20px; width: 120px; height: 120px; border: 2px solid #00ffcc; border-radius: 15px; background: #051a1a; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(0,255,204,0.4); }
        #refCanvas { width: 100px; height: 100px; }
        #instr { text-align: center; font-size: 14px; letter-spacing: 2px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="score">0%</div>
    <div id="reference-box">
        <canvas id="refCanvas" width="200" height="200"></canvas>
    </div>
    <div id="instr">NAKRESLI SYMBOL OD OKA (JEDNÍM TAHEM)</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const refCanvas = document.getElementById('refCanvas');
    const refCtx = refCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let playerTrace = [];
    let isDrawing = false;
    let targetShape = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);

    // Definice znaku (Normalizované body 0-100)
    function initTarget() {
        targetShape = [
            {x:50, y:15}, {x:50, y:25}, {x:20, y:35}, {x:80, y:35},
            {x:50, y:35}, {x:50, y:85}, {x:40, y:75}, {x:50, y:55},
            {x:25, y:55}, {x:20, y:70}, {x:50, y:55}, {x:75, y:65}, {x:85, y:85}
        ];
        drawRef();
    }

    function drawRef() {
        refCtx.clearRect(0,0,200,200);
        refCtx.strokeStyle = '#00ffcc';
        refCtx.lineWidth = 10;
        refCtx.lineCap = refCtx.lineJoin = 'round';
        refCtx.shadowBlur = 15; refCtx.shadowColor = '#00ffcc';
        refCtx.beginPath();
        refCtx.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => refCtx.lineTo(p.x*2, p.y*2));
        refCtx.stroke();
    }

    // Funkce pro normalizaci (převod jakéhokoli kreslení na čtverec 0-100)
    function normalize(points) {
        let minX = Math.min(...points.map(p => p.x)), maxX = Math.max(...points.map(p => p.x));
        let minY = Math.min(...points.map(p => p.y)), maxY = Math.max(...points.map(p => p.y));
        let width = maxX - minX, height = maxY - minY;
        let size = Math.max(width, height);
        return points.map(p => ({
            x: ((p.x - minX) / size) * 80 + 10, // Roztáhnout na 80% s 10% okrajem
            y: ((p.y - minY) / size) * 80 + 10
        }));
    }

    function handleStart(e) {
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        isDrawing = true;
        playerTrace = [{x: t.clientX, y: t.clientY}];
        scoreEl.classList.remove('show');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function handleMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const newPoint = {x: t.clientX, y: t.clientY};
        
        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(playerTrace[playerTrace.length-1].x, playerTrace[playerTrace.length-1].y);
        ctx.lineTo(newPoint.x, newPoint.y);
        ctx.stroke();
        
        playerTrace.push(newPoint);
    }

    function handleEnd() {
        if (!isDrawing || playerTrace.length < 10) { isDrawing = false; return; }
        isDrawing = false;
        
        // Magie: Normalizujeme hráčovu stopu, aby nezáleželo na pozici ani velikosti
        const normPlayer = normalize(playerTrace);
        
        // Porovnání (Dynamic Time Warping zjednodušený)
        let diff = 0;
        let samples = 30; // Porovnáme 30 bodů podél trasy
        for(let i=0; i<samples; i++) {
            let pIdx = Math.floor((i/(samples-1)) * (normPlayer.length-1));
            let tIdx = Math.floor((i/(samples-1)) * (targetShape.length-1));
            let d = Math.hypot(normPlayer[pIdx].x - targetShape[tIdx].x, normPlayer[pIdx].y - targetShape[tIdx].y);
            diff += d;
        }
        
        let score = Math.max(0, 100 - (diff / samples) * 2.5);
        scoreEl.innerText = score.toFixed(0) + "%";
        scoreEl.style.color = score > 75 ? '#00ffcc' : '#ff0055';
        scoreEl.classList.add('show');
        
        if (navigator.vibrate) navigator.vibrate(score > 75 ? 50 : 200);
    }

    canvas.addEventListener('touchstart', handleStart, {passive:false});
    canvas.addEventListener('touchmove', handleMove, {passive:false});
    canvas.addEventListener('touchend', handleEnd);
    resize(); initTarget();
</script>
</body>
</html>
