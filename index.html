<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - FLOW STATE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: #fff; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; }
        #score { font-size: 70px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #fff; opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #score.show { opacity: 1; transform: scale(1.1); }
        #reference-box { position: absolute; top: 25px; right: 25px; width: 130px; height: 130px; border: 2px solid #ff00ff; border-radius: 20px; background: rgba(255, 0, 255, 0.05); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(255,0,255,0.3); backdrop-filter: blur(5px); }
        #refCanvas { width: 100px; height: 100px; }
        #instr { text-align: center; font-size: 12px; letter-spacing: 4px; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; animation: pulse 2.5s infinite; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="score">0%</div>
    <div id="reference-box">
        <canvas id="refCanvas" width="200" height="200"></canvas>
    </div>
    <div id="instr">NAKRESLI SYMBOL OD OKA</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const refCanvas = document.getElementById('refCanvas');
    const refCtx = refCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let playerTrace = [];
    let isDrawing = false;
    let targetShape = [];
    const mainNeonColor = '#ff00ff'; // Magentový neon

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);

    // DEFINICE: "NEONOVÝ UZEL" - Plynulá smyčka jedním tahem
    function initTarget() {
        targetShape = [
            {x: 50, y: 10},  // Horní vrchol
            {x: 80, y: 40},  // Pravá smyčka ven
            {x: 50, y: 50},  // Střed
            {x: 20, y: 60},  // Levá smyčka dolů
            {x: 50, y: 90},  // Spodní vrchol
            {x: 80, y: 60},  // Pravá smyčka dolů
            {x: 50, y: 50},  // Střed (návrat)
            {x: 20, y: 40},  // Levá smyčka nahoru
            {x: 50, y: 10}   // Uzavření nahoře
        ];
        drawRef();
    }

    function drawRef() {
        refCtx.clearRect(0,0,200,200);
        refCtx.strokeStyle = mainNeonColor;
        refCtx.lineWidth = 12;
        refCtx.lineCap = refCtx.lineJoin = 'round';
        refCtx.shadowBlur = 20; refCtx.shadowColor = mainNeonColor;
        
        refCtx.beginPath();
        refCtx.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        // Použití quadraticCurve pro hladší vzhled v náhledu
        for(let i = 1; i < targetShape.length; i++) {
            refCtx.lineTo(targetShape[i].x*2, targetShape[i].y*2);
        }
        refCtx.stroke();
    }

    function normalize(points) {
        let minX = Math.min(...points.map(p => p.x)), maxX = Math.max(...points.map(p => p.x));
        let minY = Math.min(...points.map(p => p.y)), maxY = Math.max(...points.map(p => p.y));
        let width = maxX - minX, height = maxY - minY;
        let size = Math.max(width, height);
        if(size === 0) return points;
        return points.map(p => ({
            x: ((p.x - minX) / size) * 80 + 10,
            y: ((p.y - minY) / size) * 80 + 10
        }));
    }

    function handleStart(e) {
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        isDrawing = true;
        playerTrace = [{x: t.clientX, y: t.clientY}];
        scoreEl.classList.remove('show');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function handleMove(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const newPoint = {x: t.clientX, y: t.clientY};
        
        ctx.shadowBlur = 20; ctx.shadowColor = mainNeonColor;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(playerTrace[playerTrace.length-1].x, playerTrace[playerTrace.length-1].y);
        ctx.lineTo(newPoint.x, newPoint.y);
        ctx.stroke();
        
        playerTrace.push(newPoint);
    }

    function handleEnd() {
        if (!isDrawing || playerTrace.length < 15) { isDrawing = false; return; }
        isDrawing = false;
        
        const normPlayer = normalize(playerTrace);
        
        let diff = 0;
        let samples = 50; 
        for(let i=0; i<samples; i++) {
            let pIdx = Math.floor((i/(samples-1)) * (normPlayer.length-1));
            let tIdx = Math.floor((i/(samples-1)) * (targetShape.length-1));
            let d = Math.hypot(normPlayer[pIdx].x - targetShape[tIdx].x, normPlayer[pIdx].y - targetShape[tIdx].y);
            diff += d;
        }
        
        let score = Math.max(0, 100 - (diff / samples) * 2.8);
        
        // Penalizace za neuzavření tvaru (vzdálenost startu a konce)
        const startEndDist = Math.hypot(normPlayer[0].x - normPlayer[normPlayer.length-1].x, normPlayer[0].y - normPlayer[normPlayer.length-1].y);
        if (startEndDist > 15) score -= 10;

        scoreEl.innerText = Math.max(0, score).toFixed(0) + "%";
        scoreEl.style.color = score > 80 ? '#00ffcc' : (score > 50 ? '#ffcc00' : '#ff0055');
        scoreEl.classList.add('show');
        
        if (navigator.vibrate) navigator.vibrate(score > 80 ? [50, 30, 50] : 150);
    }

    canvas.addEventListener('touchstart', handleStart, {passive:false});
    canvas.addEventListener('touchmove', handleMove, {passive:false});
    canvas.addEventListener('touchend', handleEnd);
    
    // PC Support
    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', (e) => { if(isDrawing) handleMove(e); });
    window.addEventListener('mouseup', handleEnd);

    resize(); initTarget();
</script>
</body>
</html>
