<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; color: #fff; user-select: none; webkit-user-select: none; }
        canvas { display: block; touch-action: none; }
        
        /* UI prvky */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #header { text-align: center; opacity: 0.8; }
        #score { font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #fff; }
        #lives { font-size: 18px; color: #ff0055; text-shadow: 0 0 5px #ff0055; }
        
        #footer { text-align: center; bottom: 30px; }
        #instr { font-size: 16px; animation: pulse 1.5s infinite; }
        
        /* Tlačítko pro sdílení - aktivní jen při GameOver */
        #shareBtn { pointer-events: auto; display: none; margin-top: 20px; padding: 15px 30px; background: transparent; border: 2px solid #00ffcc; color: #00ffcc; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; text-shadow: 0 0 5px #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.3); }

        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="header">
        <div id="score">0.0s</div>
        <div id="lives">POKUSY: 1</div>
    </div>
    <div id="footer">
        <div id="instr">PŘILOŽ PRST NA STŘED</div>
        <button id="shareBtn" onclick="shareGame()">ZÍSKEJ POKUS (SDÍLEJ)</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const instrEl = document.getElementById('instr');
    const shareBtn = document.getElementById('shareBtn');
    
    // Herní proměnné
    let isPlaying = false;
    let startTime = 0;
    let score = 0;
    let target = { x: 0, y: 0, radius: 25, color: '#00ffcc' }; // Neonově tyrkysová
    let playerPos = { x: 0, y: 0 };
    let speed = 2; // Počáteční rychlost
    let angle = Math.random() * Math.PI * 2; // Náhodný směr pohybu

    // Inicializace plátna
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        target.x = canvas.width / 2;
        target.y = canvas.height / 2;
        if (!isPlaying) drawStartScreen();
    }
    window.addEventListener('resize', resize);
    resize();

    // Hlavní herní smyčka
    function gameLoop() {
        if (!isPlaying) return;
        
        update();
        draw();
        
        requestAnimationFrame(gameLoop);
    }

    // Aktualizace logiky (pohyb bodu, kontrola kolize)
    function update() {
        // 1. Aktualizace času (skóre)
        score = (Date.now() - startTime) / 1000;
        scoreEl.innerText = score.toFixed(1) + 's';
        
        // 2. Pohyb cíle
        target.x += Math.cos(angle) * speed;
        target.y += Math.sin(angle) * speed;
        
        // 3. Odraz od stěn a náhodná změna směru
        if (target.x < target.radius || target.x > canvas.width - target.radius) {
            angle = Math.PI - angle + (Math.random() - 0.5) * 0.5;
        }
        if (target.y < target.radius || target.y > canvas.height - target.radius) {
            angle = -angle + (Math.random() - 0.5) * 0.5;
        }
        
        // 4. Postupné zrychlování (návykový prvek)
        speed = 2 + (score / 10); // Každých 10s se rychlost zvýší o 1
        
        // 5. Kontrola, zda je prst na cíli
        const dist = Math.hypot(playerPos.x - target.x, playerPos.y - target.y);
        if (dist > target.radius + 5) { // Malá tolerance pro prst
            gameOver();
        }
    }

    // Vykreslování (vizuální efekty)
    function draw() {
        // Efekt "mizení stopy" (částečné překrytí černou)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Vykreslení neonové stopy za prstem
        ctx.shadowBlur = 15;
        ctx.shadowColor = target.color;
        ctx.strokeStyle = '#fff'; // Bílé jádro stopy
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        
        // Tady by se kreslila čára od minulé pozice prstu k současné
        // Pro jednoduchost jen bod
        ctx.beginPath();
        ctx.arc(playerPos.x, playerPos.y, 2, 0, Math.PI * 2);
        ctx.stroke();
        
        // Vykreslení zářícího cíle (Neon Pulse)
        ctx.shadowBlur = 25 + Math.sin(Date.now()/200) * 10; // Pulzování záře
        ctx.fillStyle = '#fff'; // Bílé jádro
        ctx.beginPath();
        ctx.arc(target.x, target.y, target.radius - 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = target.color; // Barevný neonový okraj
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
        ctx.stroke();
        
        // Reset záře pro ostatní prvky
        ctx.shadowBlur = 0;
    }

    function drawStartScreen() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Zářící středový bod pro začátek
        ctx.shadowBlur = 30;
        ctx.shadowColor = target.color;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, target.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function startGame(x, y) {
        // Kontrola, zda se dotkl středu
        const dist = Math.hypot(x - canvas.width/2, y - canvas.height/2);
        if (dist < target.radius + 20) {
            isPlaying = true;
            startTime = Date.now();
            score = 0;
            speed = 2;
            playerPos = { x: x, y: y };
            target.x = x;
            target.y = y;
            instrEl.style.display = 'none';
            shareBtn.style.display = 'none';
            // Krátká vibrace pro zpětnou vazbu (pokud mobil umí)
            if (navigator.vibrate) navigator.vibrate(50);
            gameLoop();
        }
    }

    function gameOver() {
        isPlaying = false;
        // Vizuální efekt "prasknutí"
        ctx.shadowBlur = 50;
        ctx.shadowColor = '#ff0055'; // Červená pro smrt
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(target.x - 50, target.y - 50);
        ctx.lineTo(target.x + 50, target.y + 50);
        ctx.moveTo(target.x + 50, target.y - 50);
        ctx.lineTo(target.x - 50, target.y + 50);
        ctx.stroke();
        
        // UI změny
        instrEl.innerText = 'KONEC. SKÓRE: ' + score.toFixed(1) + 's';
        instrEl.style.color = '#ff0055';
        instrEl.style.display = 'block';
        shareBtn.style.display = 'inline-block';
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Vibrace smrti
    }

    // Ovládání dotykem
    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        if (!isPlaying) {
            startGame(t.clientX, t.clientY);
        } else {
            playerPos = { x: t.clientX, y: t.clientY };
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isPlaying) return;
        const t = e.touches[0];
        playerPos = { x: t.clientX, y: t.clientY };
        e.preventDefault(); // Zabrání scrollování stránky
    });

    canvas.addEventListener('touchend', gameOver);

    // Funkce pro sdílení (The Hook)
    function shareGame() {
        const myID = "player_" + Math.random().toString(36).substring(7);
        const url = window.location.href + "?ref=" + myID;
        if (navigator.share) {
            navigator.share({ title: 'Trumfneš mě?', text: 'Moje soustředění vydrželo ' + score.toFixed(1) + 's v NEON PULSE. Zkus to taky!', url: url });
        } else {
            alert("Zkopíruj tento odkaz: " + url);
        }
    }

    // Registrace PWA Service Workeru
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
