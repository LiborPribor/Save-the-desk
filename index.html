<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON PRECISION - CLOUD SYNC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        #stats-bar { display: flex; justify-content: space-between; pointer-events: auto; background: rgba(20,20,20,0.85); padding: 15px; border-radius: 15px; border: 1px solid #444; backdrop-filter: blur(10px); margin-top: env(safe-area-inset-top); }
        .stat-item { text-align: center; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 20px; font-weight: 900; color: #ff00ff; }

        #score-display { font-size: 90px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #ff00ff; opacity: 0; transition: 0.3s; transform: scale(0.5); }
        #score-display.show { opacity: 1; transform: scale(1); }

        #chart-container { width: 100%; height: 100px; background: rgba(10,10,10,0.7); border-radius: 15px; pointer-events: auto; padding: 10px; box-sizing: border-box; border: 1px solid #333; margin-bottom: env(safe-area-inset-bottom); }
        
        #reference-box { position: absolute; top: 110px; right: 20px; width: 85px; height: 85px; border: 2px solid #ff00ff; border-radius: 10px; background: #000; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(255,0,255,0.3); }
        #refCanvas { width: 70px; height: 70px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="stats-bar">
        <div class="stat-item"><div class="stat-label">Tvá Bestie</div><div id="max-score" class="stat-value">--</div></div>
        <div class="stat-item"><div class="stat-label">Světové Tahy</div><div id="global-counter" class="stat-value">0</div></div>
    </div>

    <div id="score-display">0%</div>

    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>

    <div id="chart-container">
        <canvas id="progressChart"></canvas>
    </div>
</div>

<script>
    // --- KONFIGURACE Z TVÉHO SCREENSHOTU ---
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        storageBucket: "neon-desk.firebasestorage.app",
        messagingSenderId: "721167653862",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- SLEDOVÁNÍ GLOBÁLNÍCH TAHŮ ---
    db.ref('global_draws').on('value', (s) => {
        document.getElementById('global-counter').innerText = s.val() || 0;
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    
    let playerTrace = [];
    let isDrawing = false;
    let localHistory = JSON.parse(localStorage.getItem('neon_v3_scores')) || [];

    // Symbol: Uzel
    const targetShape = [{x:50,y:10},{x:85,y:45},{x:50,y:50},{x:15,y:55},{x:50,y:90},{x:85,y:55},{x:50,y:50},{x:15,y:45},{x:50,y:10}];

    // --- GRAF ---
    const chartCtx = document.getElementById('progressChart').getContext('2d');
    let progressChart = new Chart(chartCtx, {
        type: 'line',
        data: {
            labels: localHistory.map((_, i) => i + 1),
            datasets: [{ data: localHistory, borderColor: '#ff00ff', tension: 0.4, pointRadius: 0, borderWidth: 2 }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100, display: false }, x: { display: false } }, plugins: { legend: { display: false } } }
    });

    function updateUI() {
        if(localHistory.length > 0) {
            document.getElementById('max-score').innerText = Math.max(...localHistory) + "%";
            progressChart.data.labels = localHistory.map((_, i) => i + 1);
            progressChart.data.datasets[0].data = localHistory;
            progressChart.update();
        }
    }

    // --- HODNOCENÍ ---
    function evaluate() {
        if (playerTrace.length < 10) return;
        
        let score = calculateScore();
        
        scoreDisplay.innerText = Math.round(score) + "%";
        scoreDisplay.classList.add('show');

        localHistory.push(Math.round(score));
        localStorage.setItem('neon_v3_scores', JSON.stringify(localHistory));

        // ZÁPIS DO FIREBASE
        db.ref('global_draws').transaction(c => (c || 0) + 1);
        db.ref('scores_log').push({ val: score, time: Date.now() });

        updateUI();
    }

    function calculateScore() {
        let minX = Math.min(...playerTrace.map(p => p.x)), maxX = Math.max(...playerTrace.map(p => p.x));
        let minY = Math.min(...playerTrace.map(p => p.y)), maxY = Math.max(...playerTrace.map(p => p.y));
        let userW = maxX - minX; let userH = maxY - minY;
        let ratio = userW / (userH || 1);
        let score = 100 - (Math.abs(1 - ratio) * 60); 
        return Math.max(5, Math.min(99, score - (Math.random() * 5)));
    }

    // --- KRESLENÍ ---
    const drawRef = () => {
        const rc = document.getElementById('refCanvas');
        const rCtx = rc.getContext('2d');
        rCtx.clearRect(0,0,200,200);
        rCtx.strokeStyle = '#ff00ff'; rCtx.lineWidth = 15; rCtx.lineCap = 'round'; rCtx.lineJoin = 'round';
        rCtx.beginPath(); rCtx.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => rCtx.lineTo(p.x*2, p.y*2)); rCtx.stroke();
    };

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault(); isDrawing = true;
        const t = e.touches[0];
        playerTrace = [{x: t.clientX, y: t.clientY}];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        scoreDisplay.classList.remove('show');
    }, {passive:false});

    canvas.addEventListener('touchmove', (e) => {
        if(!isDrawing) return;
        const t = e.touches[0];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff';
        ctx.beginPath(); ctx.moveTo(playerTrace[playerTrace.length-1].x, playerTrace[playerTrace.length-1].y);
        ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    }, {passive:false});

    canvas.addEventListener('touchend', () => { if(isDrawing) { isDrawing = false; evaluate(); } });

    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawRef(); });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    drawRef();
    updateUI();
</script>
</body>
</html>
