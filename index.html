<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.imgur.com/your-icon-512.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050505; 
            font-family: 'Segoe UI', sans-serif; color: #fff; 
            touch-action: none; overscroll-behavior: none;
            position: fixed;
        }
        
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; 
            flex-direction: column; padding: 20px; box-sizing: border-box; 
        }

        .glass-panel { 
            background: rgba(15,15,15,0.92); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid #444; 
            padding: 10px; pointer-events: auto; 
        }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .login-box { 
            text-align: center; width: 85%; max-width: 350px; 
            padding: 25px; border: 1px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            box-sizing: border-box;
        }

        .login-input { 
            background: #111; border: 1px solid #444; padding: 12px; 
            border-radius: 8px; color: #fff; width: 100%; 
            margin-bottom: 20px; text-align: center; font-size: 16px; 
            box-sizing: border-box;
        }
        
        .tutorial-box { 
            text-align: left; font-size: 12px; color: #ccc; 
            background: rgba(255,0,255,0.05); padding: 15px; 
            border-radius: 8px; margin-bottom: 20px; 
            border: 1px solid rgba(255,0,255,0.2); 
            line-height: 1.4;
        }
        .tutorial-box b { color: #ff00ff; display: block; margin-bottom: 5px; }

        #top-row { display: flex; gap: 10px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #ff00ff; }
        
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: 900; color: #ff00ff; display: block; }
        .moves-count { color: #00ff00 !important; }

        #side-menu { 
            position: absolute; top: 0; left: -100%; width: 85%; height: 100%; 
            background: #0a0a0a; z-index: 100; transition: 0.3s; 
            padding: 40px 20px; pointer-events: auto; 
            border-right: 1px solid #ff00ff; box-sizing: border-box; overflow-y: auto; 
        }
        #side-menu.open { left: 0; }
        
        .friend-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .friend-row.me { background: rgba(255, 0, 255, 0.15); color: #ff00ff; font-weight: bold; border-radius: 5px; }

        #result-container { margin-top: 10px; text-align: center; display: none; }
        #score-display { font-size: 60px; font-weight: 900; color: #ff00ff; text-shadow: 0 0 20px rgba(255,0,255,0.5); }
        
        .btn { border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-challenge { background: #ff00ff; color: #fff; }
        .btn-ok { background: #333; color: #fff; }

        #reference-box { 
            position: absolute; top: 130px; right: 20px; width: 70px; height: 70px; 
            border: 2px solid #ff00ff; border-radius: 12px; background: rgba(0,0,0,0.8); 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 15px rgba(255,0,255,0.3); pointer-events: auto;
        }
        #refCanvas { width: 60px; height: 60px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box glass-panel">
        <h1 style="color:#ff00ff; margin:0 0 15px 0; letter-spacing: 2px;">NEON KNOT</h1>
        <div class="tutorial-box">
            <b>CO MÁŠ DĚLAT?</b>
            Obkresli vzorový obrazec (vpravo nahoře) jedním souvislým tahem. Trefuj rohy a drž se linie.
        </div>
        <input type="text" id="player-name-input" class="login-input" placeholder="Tvá přezdívka..." maxlength="12">
        <div style="font-size: 10px; color: #777; margin-bottom: 20px; line-height: 1.4;">
            • Obnova tahů vždy o půlnoci<br>
            • Za každých 20 dní v řadě +1 tah navždy<br>
            • Za každého pozvaného kámoše +1 tah hned
        </div>
        <button class="btn btn-challenge" style="width:100%" onclick="savePlayerName()">START HRY</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="side-menu">
    <div style="text-align:right; font-size:28px;" onclick="toggleMenu()">✕</div>
    <h2 id="menu-user-name" style="color:#ff00ff; margin-bottom: 20px;">Hráč</h2>
    <button class="btn btn-challenge" style="width:100%; margin-bottom: 25px;" onclick="shareGame('Vyzývám tě!')">POZVAT KÁMOŠE (+1 TAH)</button>
    <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px;">TOP 10 ŽEBRÁČEK</div>
    <div id="friends-list"></div>
</div>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="toggleMenu()">☰</div>
        <div id="stats-bar" class="glass-panel">
            <div class="stat-item"><span class="stat-label">Tahy</span><span id="moves-display" class="stat-value moves-count">0</span></div>
            <div class="stat-item"><span class="stat-label">Best</span><span id="best-display" class="stat-value">0%</span></div>
            <div class="stat-item"><span class="stat-label">Řada</span><span id="streak-display" class="stat-value">🔥 0</span></div>
        </div>
    </div>
    <div id="result-container" class="glass-panel">
        <div id="score-display">0%</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-ok" onclick="resetBoard()">Znovu</button>
            <button class="btn btn-challenge" onclick="shareGame('Sleduj můj tah!')">Sdílet</button>
        </div>
    </div>
    <div id="reference-box" onclick="drawRef()"><canvas id="refCanvas" width="200" height="200"></canvas></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const urlParams = new URLSearchParams(window.location.search);
    const referrer = urlParams.get('ref');

    let userId = localStorage.getItem('neon_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);
    
    let userName = localStorage.getItem('neon_name');
    let moves = 0;
    let streak = 0;
    let bestScore = 0;

    if (userName) {
        document.getElementById('login-overlay').style.display = 'none';
        initGame();
    }

    function savePlayerName() {
        const name = document.getElementById('player-name-input').value.trim();
        if (name.length > 1) {
            userName = name;
            localStorage.setItem('neon_name', name);
            document.getElementById('login-overlay').style.display = 'none';
            db.ref(`users/${userId}`).update({ name: userName });
            if (referrer && referrer !== userId) {
                db.ref(`users/${referrer}/moves`).transaction(m => (m || 0) + 1);
                db.ref(`users/${userId}/moves`).set(2);
            } else {
                db.ref(`users/${userId}/moves`).set(1);
            }
            initGame();
        }
    }

    function initGame() {
        document.getElementById('menu-user-name').innerText = userName;
        
        // REÁLNÝ ČAS: Listener, který okamžitě aktualizuje tahy při změně v DB
        db.ref(`users/${userId}`).on('value', snap => {
            const data = snap.val() || {};
            streak = data.streak || 0;
            bestScore = data.bestScore || 0;
            moves = data.moves || 0;
            checkMidnightReset(data.lastPlayDate);
            updateUI();
            setTimeout(drawRef, 100); // Pro jistotu překreslíme vzor
        });

        db.ref('users').orderByChild('bestScore').limitToLast(10).on('value', snap => {
            const users = snap.val();
            let list = [];
            for (let id in users) list.push({ ...users[id], id: id });
            list.sort((a,b) => b.bestScore - a.bestScore);
            let html = '';
            list.forEach(u => {
                const isMe = u.id === userId ? 'me' : '';
                html += `<div class="friend-row ${isMe}"><span>${u.name}</span><b>${u.bestScore}%</b></div>`;
            });
            document.getElementById('friends-list').innerHTML = html;
        });
    }

    function checkMidnightReset(lastPlayDate) {
        const today = new Date().toLocaleDateString();
        if (lastPlayDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString();
            if (lastPlayDate === yesterdayStr) streak++; else streak = 1;
            let dailyBase = 1 + Math.floor(streak / 20);
            moves = dailyBase;
            db.ref(`users/${userId}`).update({
                moves: moves, streak: streak, lastPlayDate: today
            });
        }
    }

    function updateUI() {
        document.getElementById('moves-display').innerText = moves;
        document.getElementById('best-display').innerText = bestScore + "%";
        document.getElementById('streak-display').innerText = "🔥 " + streak;
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    let playerTrace = [], isDrawing = false, isFinished = false;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    canvas.addEventListener('touchstart', e => {
        if (isFinished || moves <= 0) return;
        isDrawing = true; playerTrace = [];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ff'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    });

    canvas.addEventListener('touchend', () => {
        if (isDrawing && playerTrace.length > 15) {
            moves--;
            db.ref(`users/${userId}/moves`).set(moves);
            evaluate();
        }
        isDrawing = false;
    });

    function evaluate() {
        isFinished = true;
        let minX = Math.min(...playerTrace.map(p=>p.x)), maxX = Math.max(...playerTrace.map(p=>p.x));
        let minY = Math.min(...playerTrace.map(p=>p.y)), maxY = Math.max(...playerTrace.map(p=>p.y));
        let size = Math.max(maxX - minX, maxY - minY, 50);
        let centerX = minX + (maxX - minX) / 2;
        let centerY = minY + (maxY - minY) / 2;
        const normPlayer = playerTrace.map(p => ({ x: ((p.x - centerX) / size) * 80 + 50, y: ((p.y - centerY) / size) * 80 + 50 }));
        let totalErr = 0;
        normPlayer.forEach(p => {
            let minDist = Infinity;
            for(let i=0; i<targetShape.length-1; i++) {
                let d = distToSegment(p, targetShape[i], targetShape[i+1]);
                if (d < minDist) minDist = d;
            }
            totalErr += minDist;
        });
        let avgErr = totalErr / normPlayer.length;
        const corners = [{x:50,y:10}, {x:85,y:40}, {x:50,y:95}, {x:15,y:40}];
        let cornersHit = 0;
        corners.forEach(c => { if (normPlayer.some(p => Math.hypot(p.x - c.x, p.y - c.y) < 14)) cornersHit++; });
        let score = 100 - (avgErr * 12);
        if (cornersHit < 4) score *= 0.4;
        let finalScore = Math.round(Math.max(0, score));
        showScore(finalScore);
        
        ctx.setLineDash([8, 8]); ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)'; ctx.lineWidth = 2;
        ctx.beginPath();
        targetShape.forEach((p, i) => {
            let rx = ((p.x - 50) / 80) * size + centerX;
            let ry = ((p.y - 50) / 80) * size + centerY;
            i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
        });
        ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign="center";
        ctx.fillText(userName.toUpperCase() + " • " + finalScore + "%", canvas.width/2, canvas.height - 40);
    }

    function distToSegment(p, v, w) {
        let l2 = Math.hypot(v.x - w.x, v.y - w.y)**2;
        if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function showScore(s) {
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('score-display').innerText = s + "%";
        if (s > bestScore) db.ref(`users/${userId}/bestScore`).set(s);
    }

    function resetBoard() {
        if (moves <= 0) { alert("Dnes už jsi vyčerpal tahy. Přijď po půlnoci!"); return; }
        ctx.clearRect(0,0,canvas.width, canvas.height);
        document.getElementById('result-container').style.display = 'none';
        isFinished = false;
        drawRef();
    }

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

    function drawRef() {
        const rCanvas = document.getElementById('refCanvas');
        if(!rCanvas) return;
        const r = rCanvas.getContext('2d');
        r.clearRect(0,0,200,200);
        r.shadowBlur = 15; r.shadowColor = '#ff00ff';
        r.strokeStyle = '#ff00ff'; r.lineWidth = 12; r.lineCap = 'round'; r.lineJoin = 'round';
        r.beginPath();
        targetShape.forEach((p, i) => { if(i === 0) r.moveTo(p.x*2, p.y*2); else r.lineTo(p.x*2, p.y*2); });
        r.stroke();
        r.shadowBlur = 0; r.strokeStyle = '#fff'; r.lineWidth = 4; r.stroke();
    }

    window.onload = () => { setTimeout(drawRef, 500); };
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawRef(); });

    async function shareGame(msg) {
        const shareUrl = window.location.origin + window.location.pathname + '?ref=' + userId;
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        const file = new File([blob], 'neon_knot.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({ title: 'Neon Knot Challenge', text: `${msg} Moje best skóre je ${bestScore}%. Zkus to taky!`, url: shareUrl, files: [file] });
        } else { prompt("Pošli odkaz kámošům:", shareUrl); }
    }
</script>
</body>
</html>
