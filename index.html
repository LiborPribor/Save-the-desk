<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - HARDCORE PRECISION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: rgba(15,15,15,0.9); backdrop-filter: blur(15px); border-radius: 12px; border: 1px solid #444; padding: 10px; pointer-events: auto; }
        #top-row { display: flex; gap: 10px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #ff00ff; }
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }
        .stat-value { font-size: 16px; font-weight: 900; color: #ff00ff; }
        #result-container { margin-top: 10px; text-align: center; display: none; pointer-events: auto; width: 100%; }
        #score-display { font-size: 70px; font-weight: 900; text-shadow: 0 0 20px #ff00ff; color: #fff; }
        .btn { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-ok { background: #333; color: #fff; }
        #reference-box { position: absolute; top: 130px; right: 20px; width: 60px; height: 60px; border: 1px solid #ff00ff; border-radius: 8px; }
        #refCanvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="location.reload()">🔄</div>
        <div id="stats-bar" class="glass-panel">
            <div><span style="font-size:8px; color:#888">BEST</span> <span id="all-time-best" class="stat-value">0%</span></div>
        </div>
    </div>

    <div id="result-container" class="glass-panel">
        <div id="score-display">0%</div>
        <button class="btn btn-ok" onclick="resetBoard()">Zkusit znovu</button>
    </div>

    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>
</div>

<script>
    // Firebase Config (Ponechán tvůj původní)
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = localStorage.getItem('neon_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);

    let bestEver = 0;
    db.ref(`users/${userId}/bestScore`).on('value', snap => {
        bestEver = snap.val() || 0;
        document.getElementById('all-time-best').innerText = bestEver + "%";
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    
    let playerTrace = [], isDrawing = false, isFinished = false;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    canvas.addEventListener('touchstart', e => {
        if (isFinished) return;
        isDrawing = true;
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    });

    canvas.addEventListener('touchend', () => {
        if (isDrawing && playerTrace.length > 20) evaluate();
        isDrawing = false;
    });

    function evaluate() {
        isFinished = true;
        let minX = Math.min(...playerTrace.map(p=>p.x)), maxX = Math.max(...playerTrace.map(p=>p.x));
        let minY = Math.min(...playerTrace.map(p=>p.y)), maxY = Math.max(...playerTrace.map(p=>p.y));
        let size = Math.max(maxX - minX, maxY - minY, 50);
        let centerX = minX + (maxX-minX)/2;
        let centerY = minY + (maxY-minY)/2;

        const normPlayer = playerTrace.map(p => ({
            x: ((p.x - centerX) / size) * 80 + 50,
            y: ((p.y - centerY) / size) * 80 + 50
        }));

        // --- HARDCORE LOGIKA ---
        
        // 1. Trest za "vatu" (délka tahu)
        let playerLen = 0;
        for(let i=1; i<playerTrace.length; i++) playerLen += Math.hypot(playerTrace[i].x-playerTrace[i-1].x, playerTrace[i].y-playerTrace[i-1].y);
        let idealLen = size * 3.5; // Přibližný obvod diamantu
        let lenPenalty = Math.max(0, (playerLen / idealLen) - 1.2) * 100;

        // 2. Kontrola rohů (musí tam být body)
        let cornersHit = 0;
        const corners = [{x:50,y:10}, {x:85,y:40}, {x:15,y:40}, {x:50,y:95}];
        corners.forEach(c => {
            if (normPlayer.some(p => Math.hypot(p.x - c.x, p.y - c.y) < 12)) cornersHit++;
        });

        // 3. Geometrická shoda (přísná)
        let totalError = 0;
        normPlayer.forEach(p => {
            let minDist = Infinity;
            for(let i=0; i<targetShape.length-1; i++) {
                let d = distToSegment(p, targetShape[i], targetShape[i+1]);
                if (d < minDist) minDist = d;
            }
            totalError += minDist;
        });
        let avgError = totalError / normPlayer.length;

        // VÝPOČET
        let score = 100 - (avgError * 10);
        score -= lenPenalty; // Šudlání čar sráží body drasticky
        
        // Pokud chybí rohy, je to konečná
        if (cornersHit < 3) score *= 0.2; 
        
        let finalScore = Math.round(Math.max(0, score));

        // Vykreslení "stínu" pro porovnání
        ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255, 0, 255, 0.5)'; ctx.lineWidth = 2;
        ctx.beginPath();
        targetShape.forEach((p, i) => {
            let rx = ((p.x - 50) / 80) * size + centerX;
            let ry = ((p.y - 50) / 80) * size + centerY;
            if(i === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
        });
        ctx.stroke();

        document.getElementById('result-container').style.display = 'block';
        document.getElementById('score-display').innerText = finalScore + "%";
        if(finalScore > bestEver) db.ref(`users/${userId}/bestScore`).set(finalScore);
    }

    function distToSegment(p, v, w) {
        let l2 = Math.hypot(v.x - w.x, v.y - w.y)**2;
        if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function resetBoard() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        document.getElementById('result-container').style.display = 'none';
        isFinished = false;
    }

    function drawRef() {
        const r = document.getElementById('refCanvas').getContext('2d');
        r.clearRect(0,0,200,200); r.strokeStyle='#ff00ff'; r.lineWidth=12; r.lineCap='round';
        r.beginPath(); r.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => r.lineTo(p.x*2, p.y*2)); r.stroke();
    }
    drawRef();
</script>
</body>
</html>
