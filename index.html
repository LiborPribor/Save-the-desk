<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - BALANCED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: sans-serif; color: #fff; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .panel { background: rgba(20,20,20,0.8); backdrop-filter: blur(10px); border: 1px solid #444; padding: 10px; border-radius: 10px; pointer-events: auto; }
        #score-display { font-size: 80px; font-weight: 900; text-align: center; margin-top: 40px; text-shadow: 0 0 20px #f0f; opacity: 0; transition: 0.3s; }
        #score-display.show { opacity: 1; }
        #ref-box { position: absolute; top: 120px; right: 20px; width: 60px; height: 60px; border: 1px solid #f0f; border-radius: 8px; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div class="panel" style="display:flex; justify-content: space-between; align-items: center;">
        <div>BEST: <span id="best-val">0%</span></div>
        <div style="color:#f0f; font-weight:bold;">NEON KNOT</div>
        <div onclick="location.reload()">RESTART</div>
    </div>
    <div id="score-display">0%</div>
    <div id="ref-box"><canvas id="refCanvas" width="100" height="100" style="width:100%; height:100%;"></canvas></div>
</div>

<script>
    // Firebase setup (tvůj stávající)
    const firebaseConfig = { apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ", databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userId = localStorage.getItem('neon_uid') || 'u' + Math.random().toString(36).substr(2,5);
    localStorage.setItem('neon_uid', userId);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    
    let playerTrace = [], isDrawing = false, strokeTimer = null, bestScore = 0;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    db.ref(`users/${userId}/bestScore`).on('value', s => { bestScore = s.val() || 0; document.getElementById('best-val').innerText = bestScore + "%"; });

    canvas.addEventListener('touchstart', e => {
        if (strokeTimer) clearTimeout(strokeTimer);
        if (!isDrawing) {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            document.getElementById('score-display').classList.remove('show');
            playerTrace = [];
        }
        isDrawing = true;
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const last = playerTrace[playerTrace.length-1];
        const now = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#f0f'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(now.x, now.y); ctx.stroke();
        playerTrace.push(now);
    });

    canvas.addEventListener('touchend', () => { strokeTimer = setTimeout(evaluate, 250); });

    function evaluate() {
        if (!isDrawing || playerTrace.length < 15) { isDrawing = false; return; }
        isDrawing = false;

        let minX = Math.min(...playerTrace.map(p=>p.x)), maxX = Math.max(...playerTrace.map(p=>p.x));
        let minY = Math.min(...playerTrace.map(p=>p.y)), maxY = Math.max(...playerTrace.map(p=>p.y));
        let userW = maxX - minX, userH = maxY - minY;
        let size = Math.max(userW, userH, 50);
        let cX = minX + userW/2, cY = minY + userH/2;

        const normPlayer = playerTrace.map(p => ({ x: ((p.x - cX) / size) * 80 + 50, y: ((p.y - cY) / size) * 80 + 50 }));

        // 1. Bodová shoda (vzdálenost od nejbližšího bodu předlohy)
        let totalDist = 0;
        normPlayer.forEach(p => {
            let minDist = Math.min(...targetShape.map(t => Math.hypot(p.x - t.x, p.y - t.y)));
            totalDist += minDist;
        });
        let accuracy = Math.max(0, 100 - (totalDist / normPlayer.length) * 7);

        // 2. Kontrola délky (Šudlání stop!)
        let pLen = 0;
        for(let i=1; i<playerTrace.length; i++) pLen += Math.hypot(playerTrace[i].x-playerTrace[i-1].x, playerTrace[i].y-playerTrace[i-1].y);
        let tLen = size * 3.8; 
        let lenRatio = pLen / tLen;

        // 3. Kontrola tvaru (Knedlík vs Diamant)
        // Spočítáme průměrnou vzdálenost bodů od středu (u diamantu musí kolísat)
        let distsFromCenter = normPlayer.map(p => Math.hypot(p.x - 50, p.y - 50));
        let avgDistCenter = distsFromCenter.reduce((a,b)=>a+b)/distsFromCenter.length;
        let variance = distsFromCenter.reduce((a,b)=> a + Math.abs(b - avgDistCenter), 0) / distsFromCenter.length;

        let finalScore = accuracy;
        
        // Penalizace za šudlání (čára je moc dlouhá)
        if (lenRatio > 1.4) finalScore -= (lenRatio - 1.4) * 60;
        // Penalizace za knedlík (moc malá variance ve vzdálenosti od středu - kruh)
        if (variance < 12) finalScore -= (12 - variance) * 5;

        finalScore = Math.round(Math.max(0, finalScore));

        // Kreslení "Ducha"
        ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255,0,255,0.5)'; ctx.lineWidth = 2; ctx.shadowBlur = 0;
        ctx.beginPath();
        targetShape.forEach((p,i) => {
            let rx = ((p.x-50)/80)*size + cX, ry = ((p.y-50)/80)*size + cY;
            i===0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
        });
        ctx.stroke(); ctx.setLineDash([]);

        const scoreEl = document.getElementById('score-display');
        scoreEl.innerText = finalScore + "%";
        scoreEl.classList.add('show');

        if(finalScore > bestScore) db.ref(`users/${userId}/bestScore`).set(finalScore);
    }

    // Reference
    const rCtx = document.getElementById('refCanvas').getContext('2d');
    rCtx.strokeStyle = '#f0f'; rCtx.lineWidth = 8; rCtx.lineCap = 'round'; rCtx.beginPath();
    targetShape.forEach((p,i) => { i===0 ? rCtx.moveTo(p.x, p.y) : rCtx.lineTo(p.x, p.y); }); rCtx.stroke();
</script>
</body>
</html>
