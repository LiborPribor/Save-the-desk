<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - BALANCED EDITION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .glass-panel { background: rgba(15,15,15,0.9); backdrop-filter: blur(15px); border-radius: 12px; border: 1px solid #444; padding: 10px; pointer-events: auto; }
        #top-row { display: flex; gap: 10px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #ff00ff; }
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 16px; font-weight: 900; color: #ff00ff; display: block; }
        #lvl-badge { background: #ff00ff; color: #000; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 900; }
        #score-display { font-size: 90px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #ff00ff; opacity: 0; transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #score-display.show { opacity: 1; transform: scale(1); }
        #side-menu { position: absolute; top: 0; left: -100%; width: 85%; height: 100%; background: #0a0a0a; z-index: 100; transition: 0.3s; padding: 40px 20px; pointer-events: auto; border-right: 1px solid #ff00ff; box-sizing: border-box; }
        #side-menu.open { left: 0; }
        .user-header { font-size: 24px; font-weight: 900; color: #ff00ff; }
        .btn-invite { background: #00ffcc; color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        #reference-box { position: absolute; top: 130px; right: 20px; width: 80px; height: 80px; border: 1px solid #ff00ff; border-radius: 10px; background: rgba(255,0,255,0.05); display: flex; justify-content: center; align-items: center; }
        #refCanvas { width: 65px; height: 65px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="side-menu">
    <div style="text-align:right; font-size:28px;" onclick="toggleMenu()">✕</div>
    <div class="user-header" id="menu-user-name">Hráč</div>
    <div id="friends-list" style="margin-top:20px;"></div>
    <button class="btn-invite" onclick="shareGame()">📤 POZVAT KAMARÁDA</button>
</div>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="toggleMenu()">☰</div>
        <div id="stats-bar" class="glass-panel">
            <div class="stat-item"><span class="stat-label">Best</span><span id="all-time-best" class="stat-value">0%</span></div>
            <div class="stat-item"><span id="lvl-badge">LVL 1</span></div>
            <div class="stat-item"><span class="stat-label">Tahy</span><span class="stat-value">∞</span></div>
        </div>
    </div>
    <div id="score-display">0%</div>
    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const userId = localStorage.getItem('neon_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);
    let bestEver = 0;

    db.ref(`users/${userId}`).on('value', snap => {
        const data = snap.val() || {};
        bestEver = data.bestScore || 0;
        document.getElementById('all-time-best').innerText = bestEver + "%";
        document.getElementById('lvl-badge').innerText = "LVL " + (Math.floor(bestEver / 10) + 1);
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    
    let playerTrace = [], isDrawing = false, strokeTimer = null;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    canvas.addEventListener('touchstart', e => {
        if (strokeTimer) clearTimeout(strokeTimer);
        if (!isDrawing) {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            document.getElementById('score-display').classList.remove('show');
            playerTrace = [];
        }
        isDrawing = true;
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ff'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    });

    canvas.addEventListener('touchend', () => {
        strokeTimer = setTimeout(evaluateDraw, 250);
    });

    function evaluateDraw() {
        if (!isDrawing || playerTrace.length < 15) { isDrawing = false; return; }
        isDrawing = false;

        let minX = Math.min(...playerTrace.map(p=>p.x)), maxX = Math.max(...playerTrace.map(p=>p.x));
        let minY = Math.min(...playerTrace.map(p=>p.y)), maxY = Math.max(...playerTrace.map(p=>p.y));
        let userW = maxX - minX, userH = maxY - minY;
        let userCX = minX + userW/2, userCY = minY + userH/2;
        let size = Math.max(userW, userH, 50);

        // Normalizace a Brutální Centrování na střed předlohy (50,50)
        const normPlayer = playerTrace.map(p => ({
            x: ((p.x - userCX) / size) * 80 + 50,
            y: ((p.y - userCY) / size) * 80 + 50
        }));

        // --- ANTI-ŠKRABANICE FILTR (Hustota) ---
        let scribbleMultiplier = 1.0;
        const grid = {}; const gridSize = 10;
        normPlayer.forEach(p => {
            const gk = Math.floor(p.x/gridSize) + '_' + Math.floor(p.y/gridSize);
            grid[gk] = (grid[gk] || 0) + 1;
        });
        // Pokud je v jedné zóně mřížky víc než 15 bodů (vrstvení), skóre letí dolů
        let maxDensity = Math.max(...Object.values(grid), 0);
        if (maxDensity > 15) scribbleMultiplier = Math.max(0, 1.0 - (maxDensity - 15) * 0.05);

        // --- VÝPOČET GEOMETRIE (Změna logiky) ---
        let distances = targetShape.map(t => {
            let minDist = Math.min(...normPlayer.map(p => Math.hypot(p.x - t.x, p.y - t.y)));
            return minDist;
        });
        
        // Seřadíme vzdálenosti - pokud je i ta nejhorší velká, skóre klesne
        distances.sort((a, b) => a - b);
        let medianDist = distances[Math.floor(distances.length * 0.7)]; // Bereme 70% nejhorší bod
        let finalScore = Math.round(Math.max(0, 100 - (medianDist * 8.5)));

        // --- ZÓNY POKRYTÍ ---
        const coverageZones = 40; let hits = 0;
        for(let i=0; i<targetShape.length-1; i++) {
            for(let j=0; j<1; j+= 1/(coverageZones/targetShape.length)) {
                let tx = targetShape[i].x + (targetShape[i+1].x - targetShape[i].x) * j;
                let ty = targetShape[i].y + (targetShape[i+1].y - targetShape[i].y) * j;
                if(normPlayer.some(p => Math.hypot(p.x - tx, p.y - ty) < 15)) hits++;
            }
        }
        let coveragePercent = (hits / coverageZones) * 100;
        if (coveragePercent < 75) finalScore *= (coveragePercent/75); // Trest za kruhy

        // --- FINAL BLAANCE ---
        finalScore = Math.round(Math.max(0, finalScore * scribbleMultiplier));

        // Vykreslení "ducha" nákresu
        ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255, 0, 255, 0.6)'; ctx.lineWidth = 2; ctx.shadowBlur = 0;
        ctx.beginPath();
        targetShape.forEach((p, i) => {
            let rx = ((p.x - 50) / 80) * size + userCX;
            let ry = ((p.y - 50) / 80) * size + userCY;
            if(i===0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
        });
        ctx.stroke(); ctx.setLineDash([]);

        animateScore(finalScore);

        if(finalScore > bestEver) db.ref(`users/${userId}/bestScore`).set(finalScore);
    }

    function animateScore(target) {
        let curr = 0; const el = document.getElementById('score-display');
        el.classList.add('show');
        const itv = setInterval(() => {
            el.innerText = curr + "%";
            if(curr >= target) clearInterval(itv);
            curr++;
        }, 15);
    }

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    function drawRef() {
        const r = document.getElementById('refCanvas').getContext('2d');
        r.clearRect(0,0,200,200); r.strokeStyle='#ff00ff'; r.lineWidth=12; r.lineCap='round';
        r.beginPath(); r.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => r.lineTo(p.x*2, p.y*2)); r.stroke();
    }
    drawRef();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawRef(); });

    async function shareGame() {
        const url = window.location.origin + window.location.pathname + "?ref=" + userId;
        if(navigator.share) { navigator.share({title:'NEON KNOT', text:'Dáš víc než '+bestEver+'%?', url:url}); }
        else { navigator.clipboard.writeText(url); alert("Odkaz zkopírován!"); }
    }
</script>
</body>
</html>
