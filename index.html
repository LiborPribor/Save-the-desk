<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON TRACE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; color: #fff; user-select: none; webkit-user-select: none; }
        canvas { display: block; touch-action: none; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        #header { text-align: center; opacity: 0.8; }
        #score { font-size: 40px; font-weight: bold; text-shadow: 0 0 15px #fff; opacity: 0; transition: opacity 0.5s; }
        #reference { position: absolute; top: 10px; right: 10px; width: 80px; height: 80px; border: 2px solid #00ffcc; border-radius: 10px; box-shadow: 0 0 10px #00ffcc; opacity: 0.8; display: flex; justify-content: center; align-items: center; }
        #reference canvas { position: static; width: 60px; height: 60px; }
        
        #footer { text-align: center; bottom: 30px; }
        #instr { font-size: 18px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="header">
        <div id="score">0%</div>
        <div id="reference">
            <canvas id="refCanvas" width="60" height="60"></canvas>
        </div>
    </div>
    <div id="footer">
        <div id="instr">OBKRESLI SYMBOL JEDNÍM TAHEM</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const refCanvas = document.getElementById('refCanvas');
    const refCtx = refCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const instrEl = document.getElementById('instr');
    
    // Proměnné
    let playerTrace = []; // Seznam bodů tvého prstu
    let isDrawing = false;
    let targetShapePoints = []; // Definované body reference
    let targetColor = '#00ffcc'; // Neonově tyrkysová

    // Inicializace plátna
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Vycentrování reference na hlavním plátně nahoře
        drawReferenceToMain();
    }
    window.addEventListener('resize', resize);
    resize();

    // --- DEFINICE SYMBOLU: ČTVEREC (Level 1) ---
    function defineTargetShape() {
        // Body čtverce (relativní k 0-100 pro snadné škálování)
        targetShapePoints = [
            { x: 10, y: 10 }, { x: 90, y: 10 },
            { x: 90, y: 90 }, { x: 10, y: 90 },
            { x: 10, y: 10 } // Uzavření
        ];
    }
    defineTargetShape();

    // Vykreslení reference do malého okénka (UI)
    function drawReferenceToUI() {
        refCtx.clearRect(0, 0, refCanvas.width, refCanvas.height);
        refCtx.strokeStyle = targetColor;
        refCtx.lineWidth = 2;
        refCtx.lineCap = 'round';
        refCtx.lineJoin = 'round';
        refCtx.shadowBlur = 5;
        refCtx.shadowColor = targetColor;
        
        refCtx.beginPath();
        refCtx.moveTo(targetShapePoints[0].x * 0.6, targetShapePoints[0].y * 0.6); // Měřítko pro 60x60
        for (let i = 1; i < targetShapePoints.length; i++) {
            refCtx.lineTo(targetShapePoints[i].x * 0.6, targetShapePoints[i].y * 0.6);
        }
        refCtx.stroke();
        refCtx.shadowBlur = 0;
    }
    drawReferenceToUI();

    // Vykreslení reference na hlavní plátno (pro porovnání, poloprůhledné)
    function drawReferenceToMain() {
        // Měřítko pro hlavní plátno
        const scale = 250; 
        const offsetX = (canvas.width / 2) - scale/2;
        const offsetY = (canvas.height / 2) - scale/2;
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; // VELMI JEMNÉ
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        // Přepočet relativních bodů na absolutní souřadnice plátna
        ctx.moveTo(targetShapePoints[0].x * (scale/100) + offsetX, targetShapePoints[0].y * (scale/100) + offsetY);
        for (let i = 1; i < targetShapePoints.length; i++) {
            ctx.lineTo(targetShapePoints[i].x * (scale/100) + offsetX, targetShapePoints[i].y * (scale/100) + offsetY);
        }
        ctx.stroke();
    }

    // --- KRESLENÍ (Logika prstu) ---
    canvas.addEventListener('touchstart', (e) => {
        isDrawing = true;
        playerTrace = []; // Vyčistit minulý pokus
        const t = e.touches[0];
        addPoint(t.clientX, t.clientY);
        instrEl.style.display = 'none';
        scoreEl.style.opacity = '0';
        clearMainCanvas();
        drawReferenceToMain(); // Znovu vykreslit jemnou referenci
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const t = e.touches[0];
        addPoint(t.clientX, t.clientY);
        drawPlayerTrace();
        e.preventDefault(); 
    });

    canvas.addEventListener('touchend', (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        evaluateTrace();
    });

    function addPoint(x, y) {
        playerTrace.push({ x: x, y: y });
    }

    // Vyčistit plátno
    function clearMainCanvas() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Vykreslení tvé stopy (Neonový laser)
    function drawPlayerTrace() {
        // Částečné překrytí (pro efekt mizení)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (playerTrace.length < 2) return;
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = targetColor;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        ctx.moveTo(playerTrace[0].x, playerTrace[0].y);
        for (let i = 1; i < playerTrace.length; i++) {
            ctx.lineTo(playerTrace[i].x, playerTrace[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // --- VYHODNOCENÍ (The Logic) ---
    function evaluateTrace() {
        if (playerTrace.length < 5) return; // Moc krátká stopa
        
        // Měřítko pro hlavní plátno (stejné jako u drawReferenceToMain)
        const scale = 250; 
        const offsetX = (canvas.width / 2) - scale/2;
        const offsetY = (canvas.height / 2) - scale/2;

        // Převedeme referenční body na absolutní souřadnice plátna
        let targetAbsPoints = targetShapePoints.map(p => ({
            x: p.x * (scale/100) + offsetX,
            y: p.y * (scale/100) + offsetY
        }));

        // Zjednodušené porovnání (Průměrná vzdálenost bodů)
        let totalDist = 0;
        let pointsCompared = 0;

        // Pro každý bod tvé stopy najdeme nejbližší bod na referenci
        for (let pTrace of playerTrace) {
            let minDist = Infinity;
            // Porovnáme s body reference (pro demo porovnáme jen s definičními body, pro přesnost by se musely body interpolovat)
            for (let pTarget of targetAbsPoints) {
                const d = Math.hypot(pTrace.x - pTarget.x, pTrace.y - pTarget.y);
                if (d < minDist) minDist = d;
            }
            // Tolerance: Pokud je dál než 50px, ignorujeme (ujel moc daleko)
            if (minDist < 50) {
                totalDist += minDist;
                pointsCompared++;
            } else {
                totalDist += 100; // Penalizace za ujetí
                pointsCompared++;
            }
        }

        const avgDist = totalDist / pointsCompared;
        // Převedení odchylky na procenta (0px odchylka = 100%, 50px odchylka = 0%)
        let scorePercent = Math.max(0, 100 - (avgDist * 2));

        // UI Aktualizace
        scoreEl.innerText = scorePercent.toFixed(0) + '% PŘESNOST';
        scoreEl.style.opacity = '1';
        instrEl.innerText = 'PŘILOŽ PRST PRO NOVÝ POKUS';
        instrEl.style.display = 'block';

        // Vizuální zpětná vazba (Zelená pro výhru, Červená pro prohru)
        if (scorePercent > 80) {
            flashCanvas('#00ffcc'); // Tyrkysová (Záře)
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]); 
        } else {
            flashCanvas('#ff0055'); // Červená (Chyba)
            if (navigator.vibrate) navigator.vibrate(200); 
        }
    }

    // Krátké bliknutí záře při vyhodnocení
    function flashCanvas(color) {
        ctx.shadowBlur = 50;
        ctx.shadowColor = color;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 15;
        ctx.beginPath();
        if (playerTrace.length > 2) {
            ctx.moveTo(playerTrace[0].x, playerTrace[0].y);
            for (let i = 1; i < playerTrace.length; i++) ctx.lineTo(playerTrace[i].x, playerTrace[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

</script>
</body>
</html>
