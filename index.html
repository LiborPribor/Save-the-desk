<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON HARDCORE PRECISION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; color: #fff; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 20px; box-sizing: border-box; }
        #score { font-size: 80px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #fff; opacity: 0; transition: 0.2s; }
        #score.show { opacity: 1; }
        #reference-box { position: absolute; top: 20px; right: 20px; width: 100px; height: 100px; border: 2px solid #ff00ff; background: #000; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px #ff00ff; }
        #refCanvas { width: 80px; height: 80px; }
        #instr { text-align: center; font-size: 10px; letter-spacing: 4px; color: #ff00ff; opacity: 0.8; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div id="score">0%</div>
    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>
    <div id="instr">STRICT EVALUATION: ON</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const refCanvas = document.getElementById('refCanvas');
    const refCtx = refCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let playerTrace = [];
    let isDrawing = false;
    // Definice uzlu (přesné body pro geometrické porovnání)
    const targetShape = [
        {x: 50, y: 10}, {x: 85, y: 45}, {x: 50, y: 50}, 
        {x: 15, y: 55}, {x: 50, y: 90}, {x: 85, y: 55}, 
        {x: 50, y: 50}, {x: 15, y: 45}, {x: 50, y: 10}
    ];

    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        drawRef();
    }
    window.addEventListener('resize', resize);

    function drawRef() {
        refCtx.clearRect(0,0,200,200);
        refCtx.strokeStyle = '#ff00ff'; refCtx.lineWidth = 10; refCtx.lineJoin = 'miter';
        refCtx.beginPath();
        refCtx.moveTo(targetShape[0].x*2, targetShape[0].y*2);
        targetShape.forEach(p => refCtx.lineTo(p.x*2, p.y*2));
        refCtx.stroke();
    }

    function normalize(points) {
        let minX = Math.min(...points.map(p => p.x)), maxX = Math.max(...points.map(p => p.x));
        let minY = Math.min(...points.map(p => p.y)), maxY = Math.max(...points.map(p => p.y));
        let w = maxX - minX, h = maxY - minY;
        let size = Math.max(w, h, 1);
        return points.map(p => ({ x: (p.x - minX) / size * 100, y: (p.y - minY) / size * 100 }));
    }

    // Lineární interpolace pro získání bodů na ideální trase
    function getTargetPointAt(t) { // t je 0 až 1
        const segmentCount = targetShape.length - 1;
        const segment = Math.min(Math.floor(t * segmentCount), segmentCount - 1);
        const segmentT = (t * segmentCount) - segment;
        const p1 = targetShape[segment];
        const p2 = targetShape[segment + 1];
        return {
            x: p1.x + (p2.x - p1.x) * segmentT,
            y: p1.y + (p2.y - p1.y) * segmentT
        };
    }

    function handleStart(e) {
        e.preventDefault(); const t = e.touches ? e.touches[0] : e;
        isDrawing = true; playerTrace = [{x: t.clientX, y: t.clientY}];
        scoreEl.classList.remove('show');
        ctx.clearRect(0,0,canvas.width, canvas.height);
    }

    function handleMove(e) {
        if (!isDrawing) return;
        const t = e.touches ? e.touches[0] : e;
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.shadowBlur = 5; ctx.shadowColor = '#ff00ff';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    }

    function handleEnd() {
        if (!isDrawing || playerTrace.length < 10) { isDrawing = false; return; }
        isDrawing = false;
        
        let normPlayer = normalize(playerTrace);
        let totalError = 0;
        const samples = 100; // Vysoké rozlišení pro detekci roztřesenosti

        for (let i = 0; i < samples; i++) {
            let t = i / (samples - 1);
            let pPoint = normPlayer[Math.floor(t * (normPlayer.length - 1))];
            let tPoint = getTargetPointAt(t);
            
            let dist = Math.hypot(pPoint.x - tPoint.x, pPoint.y - tPoint.y);
            totalError += dist;
        }

        let avgError = totalError / samples;
        
        // PŘÍSNÁ MATEMATIKA: 
        // Každý pixel odchylky v průměru sráží body drasticky.
        // Roztřesená čára (jitter) zvyšuje průměrnou odchylku velmi rychle.
        let score = 100 - (avgError * 4); 
        
        // Penalizace za příliš málo bodů (pokud to hráč "prolétne" moc rychle bez detailů)
        if (playerTrace.length < 40) score -= 20;

        score = Math.max(0, Math.round(score));
        scoreEl.innerText = score + "%";
        scoreEl.style.color = score > 90 ? '#00ffcc' : (score > 60 ? '#ffcc00' : '#ff0055');
        scoreEl.classList.add('show');
    }

    canvas.addEventListener('touchstart', handleStart, {passive:false});
    canvas.addEventListener('touchmove', handleMove, {passive:false});
    canvas.addEventListener('touchend', handleEnd);
    resize();
</script>
</body>
</html>
