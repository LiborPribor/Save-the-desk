<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.imgur.com/your-icon-512.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050505; 
            font-family: 'Segoe UI', sans-serif; color: #fff; 
            touch-action: none; overscroll-behavior: none;
            position: fixed;
        }
        
        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; 
            flex-direction: column; padding: 20px; box-sizing: border-box; 
        }

        .glass-panel { 
            background: rgba(15,15,15,0.92); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid #444; 
            padding: 10px; pointer-events: auto; 
        }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .login-box { 
            text-align: center; width: 85%; max-width: 350px; 
            padding: 25px; border: 1px solid #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            box-sizing: border-box;
        }

        .login-input { 
            background: #111; border: 1px solid #444; padding: 12px; 
            border-radius: 8px; color: #fff; width: 100%; 
            margin-bottom: 20px; text-align: center; font-size: 16px; 
            box-sizing: border-box;
        }
        
        .tutorial-box { 
            text-align: left; font-size: 12px; color: #ccc; 
            background: rgba(255,0,255,0.05); padding: 15px; 
            border-radius: 8px; margin-bottom: 20px; 
            border: 1px solid rgba(255,0,255,0.2); 
            line-height: 1.4;
        }
        .tutorial-box b { color: #ff00ff; display: block; margin-bottom: 5px; }

        #top-row { display: flex; gap: 8px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: #ff00ff; }
        
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 15px; font-weight: 900; color: #ff00ff; display: block; }
        .moves-count { color: #00ffff !important; }
        .global-count { color: #ffffff !important; }

        #side-menu { 
            position: absolute; top: 0; left: -100%; width: 85%; height: 100%; 
            background: #0a0a0a; z-index: 100; transition: 0.3s; 
            padding: 40px 20px; pointer-events: auto; 
            border-right: 1px solid #ff00ff; box-sizing: border-box; overflow-y: auto; 
        }
        #side-menu.open { left: 0; }
        
        .info-section {
            margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.03);
            border-radius: 10px; border-left: 3px solid #ff00ff;
        }
        .info-header { display: flex; align-items: center; gap: 10px; color: #ff00ff; font-weight: bold; margin-bottom: 10px; }
        .info-icon { width: 20px; height: 20px; border: 1px solid #ff00ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .friend-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; align-items: center; cursor: pointer; }
        .friend-row:active { background: rgba(255, 255, 255, 0.05); }
        .friend-row.me { background: rgba(255, 0, 255, 0.15); color: #ff00ff; font-weight: bold; border-radius: 5px; }
        .score-link { color: #ff00ff; text-decoration: underline; }

        #result-container { margin-top: 10px; text-align: center; display: none; }
        #score-display { font-size: 60px; font-weight: 900; color: #ff00ff; text-shadow: 0 0 20px rgba(255,0,255,0.5); }
        
        .btn { border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; }
        .btn-challenge { background: #ff00ff; color: #fff; }
        .btn-ok { background: #333; color: #fff; }

        #reference-box { 
            position: absolute; 
            top: 170px; 
            right: 20px; 
            width: 70px; 
            height: 70px; 
            border: 2px solid #ff00ff; border-radius: 12px; background: rgba(0,0,0,0.8); 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 15px rgba(255,0,255,0.3); pointer-events: auto;
        }
        #refCanvas { width: 60px; height: 60px; }

        #photo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            align-items: center; justify-content: center; flex-direction: column;
        }
        #photo-img { max-width: 90%; max-height: 70%; border: 2px solid #ff00ff; border-radius: 10px; }

        #lang-switcher {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: auto; z-index: 20;
        }
        .lang-btn {
            background: rgba(255, 0, 255, 0.1); border: 1px solid rgba(255, 0, 255, 0.3);
            color: #888; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer;
        }
        .lang-btn.active { color: #ff00ff; border-color: #ff00ff; background: rgba(255, 0, 255, 0.2); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box glass-panel">
        <h1 style="color:#ff00ff; margin:0 0 15px 0; letter-spacing: 2px;">NEON KNOT</h1>
        <div class="tutorial-box">
            <b id="tut-h-1">CO MÁŠ DĚLAT?</b>
            <span id="tut-t-1">Obkresli vzor (vpravo nahoře) jedním souvislým tahem.</span>
            <br><br>
            <b id="tut-h-2">JAK ZÍSKAT TAHY NAVÍC?</b>
            <span id="tut-t-2">Klikni na "Pozvat kámoše" a pošli link. Tah se přičte až kamarád odehraje..</span>
        </div>
        <input type="text" id="player-name-input" class="login-input" placeholder="..." maxlength="12">
        <button class="btn btn-challenge" style="width:100%" onclick="savePlayerName()" id="btn-start">START HRY</button>
    </div>
</div>

<div id="photo-overlay" onclick="this.style.display='none'">
    <img id="photo-img" src="">
    <p style="margin-top:20px; color:#ff00ff; font-weight:bold;">KLIKNI KAMKOLIV PRO ZAVŘENÍ</p>
</div>

<canvas id="gameCanvas"></canvas>

<div id="side-menu">
    <div style="text-align:right; font-size:28px;" onclick="toggleMenu()">✕</div>
    <h2 id="menu-user-name" style="color:#ff00ff; margin-bottom: 10px;">Hráč</h2>
    
    <div class="info-section">
        <div class="info-header"><div class="info-icon">i</div> <span id="menu-info-title">Instrukce</span></div>
        <div style="font-size: 11px; color: #ccc; line-height: 1.5;" id="menu-info-body">
            </div>
    </div>

    <button class="btn btn-challenge" style="width:100%; margin-bottom: 25px;" onclick="shareGame()" id="btn-invite">POZVAT KÁMOŠE (+1 TAH)</button>
    
    <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px;" id="menu-top10">TOP 10 ŽEBŘÍČEK</div>
    <div id="friends-list"></div>
</div>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="toggleMenu()">☰</div>
        <div id="stats-bar" class="glass-panel">
            <div class="stat-item"><span class="stat-label" id="label-moves">Tahy</span><span id="moves-display" class="stat-value moves-count">0</span></div>
            <div class="stat-item"><span class="stat-label" id="label-best">Best</span><span id="best-display" class="stat-value">0%</span></div>
            <div class="stat-item"><span class="stat-label" id="label-streak">Řada</span><span id="streak-display" class="stat-value">🔥 0</span></div>
            <div class="stat-item"><span class="stat-label" id="label-global">Svět</span><span id="global-display" class="stat-value global-count">0</span></div>
        </div>
    </div>
    <div id="result-container" class="glass-panel">
        <div id="score-display">0%</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-ok" onclick="resetBoard()" id="btn-again">Znovu</button>
            <button class="btn btn-challenge" onclick="shareGame()" id="btn-share">Sdílet</button>
        </div>
    </div>
    <div id="reference-box" onclick="drawRef()"><canvas id="refCanvas" width="200" height="200"></canvas></div>

    <div id="lang-switcher">
        <div class="lang-btn" id="lang-cz" onclick="setLang('cz')">CZ</div>
        <div class="lang-btn" id="lang-en" onclick="setLang('en')">EN</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentLang = localStorage.getItem('neon_lang') || 'cz';
    const texts = {
        cz: {
            tutH1: "CO MÁŠ DĚLAT?", tutT1: "Obkresli vzor (vpravo nahoře) jedním souvislým tahem.",
            tutH2: "JAK ZÍSKAT TAHY NAVÍC?", tutT2: "Klikni na 'Pozvat kámoše'. Tah se přičte až kamarád odehraje..",
            start: "START HRY", invite: "POZVAT KÁMOŠE (+1 TAH)", top10: "TOP 10 ŽEBŘÍČEK",
            labelMoves: "Tahy", labelBest: "Best", labelStreak: "Řada", labelGlobal: "Svět", again: "Znovu", share: "Sdílet",
            nickPlaceholder: "Tvá přezdívka...", infoTitle: "Instrukce", 
            infoBody: "<b>CO DĚLAT?</b><br>Obkresli vzor jedním tahem.<br><br><b>ULOŽENÍ APKY NA PLOCHU:</b><br>Sdílet - zobrazit další - pridat na plochu<br><br><b>REKORDY:</b><br>Kliknutím na řádek v žebříčku zobrazíš fotku pokusu.<br><br><b>BONUSY:</b><br>Sdílej svůj link. Tah se přičte až kamarád odehraje..<br><br><b>ŘADA:</b><br>Hraj každý den. Za každých 20 dní získáš +1 tah navždy.",
            alertNoMoves: "Dnes už jsi vyčerpal tahy. Přijď po půlnoci!", shareMsg: "Koukni na můj pokus!"
        },
        en: {
            tutH1: "HOW TO PLAY?", tutT1: "Trace the pattern (top right) in one continuous stroke.",
            tutH2: "GET EXTRA MOVES?", tutT2: "Click 'Invite Friends'. Move added after your friend plays..",
            start: "START GAME", invite: "INVITE FRIENDS (+1 MOVE)", top10: "TOP 10 RANKING",
            labelMoves: "Moves", labelBest: "Best", labelStreak: "Streak", labelGlobal: "World", again: "Again", share: "Share",
            nickPlaceholder: "Your nickname...", infoTitle: "Instructions",
            infoBody: "<b>HOW TO PLAY?</b><br>Trace the pattern in one go.<br><br><b>SAVE TO HOME SCREEN:</b><br>Share - show more - add to home screen<br><br><b>RECORDS:</b><br>Click any row in the ranking to see the attempt photo.<br><br><b>BONUSES:</b><br>Share your link. Moves added after friends play..<br><br><b>STREAK:</b><br>Play daily. Every 20 days gives you +1 move forever.",
            alertNoMoves: "No moves left today. Come back after midnight!", shareMsg: "Check my attempt!"
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const referrer = urlParams.get('ref');
    let userId = localStorage.getItem('neon_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('neon_uid', userId);
    let userName = localStorage.getItem('neon_name');
    let moves = 0, streak = 0, bestScore = 0;
    let usedRefs = {};

    if (userName) document.getElementById('login-overlay').style.display = 'none';

    function setLang(l) {
        currentLang = l;
        localStorage.setItem('neon_lang', l);
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('lang-' + l);
        if(btn) btn.classList.add('active');
        const t = texts[l];
        document.getElementById('tut-h-1').innerText = t.tutH1;
        document.getElementById('tut-t-1').innerText = t.tutT1;
        document.getElementById('tut-h-2').innerText = t.tutH2;
        document.getElementById('tut-t-2').innerText = t.tutT2;
        document.getElementById('btn-start').innerText = t.start;
        document.getElementById('btn-invite').innerText = t.invite;
        document.getElementById('menu-top10').innerText = t.top10;
        document.getElementById('label-moves').innerText = t.labelMoves;
        document.getElementById('label-best').innerText = t.labelBest;
        document.getElementById('label-streak').innerText = t.labelStreak;
        document.getElementById('label-global').innerText = t.labelGlobal;
        document.getElementById('btn-again').innerText = t.again;
        document.getElementById('btn-share').innerText = t.share;
        document.getElementById('player-name-input').placeholder = t.nickPlaceholder;
        document.getElementById('menu-info-title').innerText = t.infoTitle;
        document.getElementById('menu-info-body').innerHTML = t.infoBody;
    }
    setLang(currentLang);

    db.ref(`users/${userId}`).once('value', snap => {
        const data = snap.val();
        if (data && data.name) {
            userName = data.name;
            localStorage.setItem('neon_name', userName);
            document.getElementById('login-overlay').style.display = 'none';
        }
        initGame();
    });

    function savePlayerName() {
        const name = document.getElementById('player-name-input').value.trim();
        if (name.length > 1) {
            userName = name;
            localStorage.setItem('neon_name', name);
            document.getElementById('login-overlay').style.display = 'none';
            
            db.ref(`users/${userId}`).once('value', snap => {
                if (!snap.exists()) {
                    db.ref(`users/${userId}`).set({ 
                        name: userName, 
                        moves: 1, 
                        streak: 0,
                        lastPlayDate: new Date().toLocaleDateString(),
                        invitedBy: (referrer && referrer !== userId) ? referrer : null
                    });
                } else {
                    // Fix: Pokud hráč už existuje, ale přišel přes link poprvé, uložíme mu taky invitedBy
                    let updates = { name: userName };
                    if (referrer && referrer !== userId && !snap.val().invitedBy) {
                        updates.invitedBy = referrer;
                    }
                    db.ref(`users/${userId}`).update(updates);
                }
                initGame();
            });
        }
    }

    function initGame() {
        document.getElementById('menu-user-name').innerText = userName || '...';
        
        db.ref(`users/${userId}`).on('value', snap => {
            const data = snap.val() || {};
            streak = data.streak || 0;
            bestScore = data.bestScore || 0;
            moves = data.moves || 0;
            usedRefs = data.usedRefs || {};
            
            checkMidnightReset(data.lastPlayDate);
            updateUI();
            
            if (moves <= 0 && !isDrawing && !isFinished) {
                document.getElementById('score-display').innerText = "0/0";
                document.getElementById('score-display').style.fontSize = "30px";
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('btn-again').style.opacity = "0.5";
            }
        });

        db.ref('global_moves').on('value', snap => {
            document.getElementById('global-display').innerText = snap.val() || 0;
        });

        db.ref('users').orderByChild('bestScore').limitToLast(10).on('value', snap => {
            const users = snap.val();
            let list = [];
            for (let id in users) list.push({ ...users[id], id: id });
            list.sort((a,b) => (b.bestScore || 0) - (a.bestScore || 0));
            let html = '';
            list.forEach(u => {
                const isMe = u.id === userId ? 'me' : '';
                html += `<div class="friend-row ${isMe}" onclick="viewPhoto('${u.id}')"><span>${u.name || '...'}</span><b class="score-link">${u.bestScore || 0}%</b></div>`;
            });
            document.getElementById('friends-list').innerHTML = html;
        });
    }

    function checkMidnightReset(lastPlayDate) {
        const today = new Date().toLocaleDateString();
        if (!lastPlayDate || lastPlayDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString();
            
            let currentMoves = moves > 0 ? moves : 0;
            let newStreak = (lastPlayDate === yesterdayStr) ? (streak + 1) : (lastPlayDate ? 1 : 0);
            let dailyBase = 1 + Math.floor(newStreak / 20);
            
            db.ref(`users/${userId}`).update({ 
                moves: Math.max(currentMoves, dailyBase), 
                streak: newStreak, 
                lastPlayDate: today 
            });
        }
    }

    function updateUI() {
        document.getElementById('moves-display').innerText = moves;
        document.getElementById('best-display').innerText = bestScore + "%";
        document.getElementById('streak-display').innerText = "🔥 " + streak;
        if (moves > 0) {
            document.getElementById('btn-again').style.opacity = "1";
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    let playerTrace = [], isDrawing = false, isFinished = false;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    canvas.addEventListener('touchstart', e => {
        if (isFinished || moves <= 0) {
            if(moves <= 0) alert(texts[currentLang].alertNoMoves);
            return;
        }
        isDrawing = true; playerTrace = [];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00ff'; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(t.clientX, t.clientY); ctx.stroke();
        playerTrace.push({x: t.clientX, y: t.clientY});
    });

    canvas.addEventListener('touchend', () => {
        if (isDrawing && playerTrace.length > 15) {
            if (moves > 0) {
                moves--;
                db.ref(`users/${userId}/moves`).set(moves);
            }
            db.ref('global_moves').transaction(v => (v || 0) + 1);
            evaluate();
        }
        isDrawing = false;
    });

    function evaluate() {
        isFinished = true;
        let minX = Math.min(...playerTrace.map(p=>p.x)), maxX = Math.max(...playerTrace.map(p=>p.x));
        let minY = Math.min(...playerTrace.map(p=>p.y)), maxY = Math.max(...playerTrace.map(p=>p.y));
        let size = Math.max(maxX - minX, maxY - minY, 50);
        let centerX = minX + (maxX - minX) / 2;
        let centerY = minY + (maxY - minY) / 2;
        const normPlayer = playerTrace.map(p => ({ x: ((p.x - centerX) / size) * 80 + 50, y: ((p.y - centerY) / size) * 80 + 50 }));
        let totalErr = 0;
        normPlayer.forEach(p => {
            let minDist = Infinity;
            for(let i=0; i<targetShape.length-1; i++) {
                let d = distToSegment(p, targetShape[i], targetShape[i+1]);
                if (d < minDist) minDist = d;
            }
            totalErr += minDist;
        });
        let score = Math.round(Math.max(0, 100 - ( (totalErr / normPlayer.length) * 12 )));
        const photo = canvas.toDataURL("image/webp", 0.3);
        
        if (score >= bestScore) {
            db.ref(`users/${userId}`).update({ bestScore: score, bestPhoto: photo });
        }
        
        showScore(score);

        // Fix: Robustnější přičítání bonusu majiteli linku
        db.ref(`users/${userId}`).once('value', snap => {
            const me = snap.val() || {};
            if (me.invitedBy) {
                const today = new Date().toLocaleDateString();
                const bonusPath = `users/${me.invitedBy}/dailyBonuses/${userId}`;
                
                db.ref(bonusPath).transaction((currentVal) => {
                    if (currentVal !== today) {
                        db.ref(`users/${me.invitedBy}/moves`).transaction(m => (m || 0) + 1);
                        return today;
                    }
                    return; 
                });
            }
        });
        
        drawGhost(size, centerX, centerY);
    }

    function drawGhost(size, centerX, centerY) {
        ctx.setLineDash([8, 8]); ctx.strokeStyle = 'rgba(255, 0, 255, 0.4)'; ctx.lineWidth = 2;
        ctx.beginPath();
        targetShape.forEach((p, i) => {
            let rx = ((p.x - 50) / 80) * size + centerX;
            let ry = ((p.y - 50) / 80) * size + centerY;
            i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
        });
        ctx.stroke(); ctx.setLineDash([]);
    }

    function distToSegment(p, v, w) {
        let l2 = Math.hypot(v.x - w.x, v.y - w.y)**2;
        if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function showScore(s) {
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('score-display').style.fontSize = "60px";
        document.getElementById('score-display').innerText = s + "%";
    }

    function resetBoard() {
        if (moves <= 0) { alert(texts[currentLang].alertNoMoves); return; }
        
        ctx.clearRect(0,0,canvas.width, canvas.height);
        document.getElementById('result-container').style.display = 'none';
        isFinished = false;
        drawRef();
    }

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }

    function drawRef() {
        const rCanvas = document.getElementById('refCanvas');
        if(!rCanvas) return;
        const r = rCanvas.getContext('2d');
        r.clearRect(0,0,200,200);
        r.shadowBlur = 15; r.shadowColor = '#ff00ff';
        r.strokeStyle = '#ff00ff'; r.lineWidth = 12; r.lineCap = 'round'; r.lineJoin = 'round';
        r.beginPath();
        targetShape.forEach((p, i) => { if(i === 0) r.moveTo(p.x*2, p.y*2); else r.lineTo(p.x*2, p.y*2); });
        r.stroke();
        r.shadowBlur = 0; r.strokeStyle = '#fff'; r.lineWidth = 4; r.stroke();
    }

    function viewPhoto(id) {
        db.ref(`users/${id}/bestPhoto`).once('value', snap => {
            const val = snap.val();
            if (val) {
                document.getElementById('photo-img').src = val;
                document.getElementById('photo-overlay').style.display = 'flex';
            }
        });
    }

    async function shareGame() {
        const shareUrl = window.location.origin + window.location.pathname + '?ref=' + userId;
        const msg = texts[currentLang].shareMsg + ` Best: ${bestScore}%`;
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Neon Knot', text: msg, url: shareUrl });
            } catch (e) {}
        } else {
            prompt("Copy link:", shareUrl);
        }
    }

    window.onload = () => { setTimeout(drawRef, 500); };
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawRef(); });
</script>

</body>
</html>
