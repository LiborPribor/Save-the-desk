<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --neon: #ff00ff; --cyan: #00ffff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #050505; 
            font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; 
            touch-action: none; overscroll-behavior: none;
            position: fixed;
        }

        /* Varování při otočení na šířku */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            #landscape-warning { display: flex !important; }
        }
        #landscape-warning {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#000;
            z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: var(--neon);
        }

        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; 
            flex-direction: column; padding: 20px; box-sizing: border-box; 
        }

        .glass-panel { 
            background: rgba(15,15,15,0.85); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; border: 1px solid #333; 
            padding: 10px; pointer-events: auto; 
        }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .login-box { 
            text-align: center; width: 85%; max-width: 350px; 
            padding: 25px; border: 1px solid var(--neon);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
        }

        .login-input { 
            background: #111; border: 1px solid #444; padding: 15px; 
            border-radius: 8px; color: #fff; width: 100%; 
            margin-bottom: 20px; text-align: center; font-size: 18px; 
            box-sizing: border-box; outline: none;
        }
        .login-input:focus { border-color: var(--neon); }

        #top-row { display: flex; gap: 8px; margin-top: env(safe-area-inset-top); }
        #menu-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; color: var(--neon); }
        
        #stats-bar { flex-grow: 1; display: flex; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 16px; font-weight: 900; color: var(--neon); display: block; }
        .moves-count { color: var(--cyan) !important; }

        #side-menu { 
            position: absolute; top: 0; left: -100%; width: 85%; height: 100%; 
            background: #0a0a0a; z-index: 100; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            padding: 40px 20px; pointer-events: auto; 
            border-right: 1px solid var(--neon); box-sizing: border-box; overflow-y: auto; 
        }
        #side-menu.open { left: 0; }
        
        .friend-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1a1a1a; font-size: 14px; align-items: center; }
        .friend-row.me { color: var(--neon); font-weight: bold; background: rgba(255,0,255,0.05); }

        #result-container { margin-top: 20px; text-align: center; display: none; }
        #score-display { font-size: 50px; font-weight: 900; color: var(--neon); margin-bottom: 15px; }
        
        .btn { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .btn-challenge { background: var(--neon); color: #fff; }
        .btn-challenge:active { transform: scale(0.95); opacity: 0.8; }
        .btn-ok { background: #222; color: #fff; }

        #reference-box { 
            position: absolute; top: 180px; right: 20px; 
            width: 80px; height: 80px; 
            border: 2px solid var(--neon); border-radius: 12px; background: rgba(0,0,0,0.8); 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 0 15px rgba(255,0,255,0.3); pointer-events: auto;
        }
        #refCanvas { width: 70px; height: 70px; }

        #photo-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            align-items: center; justify-content: center; flex-direction: column;
        }
        #photo-img { max-width: 90%; max-height: 70%; border: 2px solid var(--neon); border-radius: 10px; }

        #lang-switcher {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; pointer-events: auto;
        }
        .lang-btn { color: #555; font-size: 12px; font-weight: bold; cursor: pointer; }
        .lang-btn.active { color: var(--neon); text-decoration: underline; }
    </style>
</head>
<body>

<div id="landscape-warning">
    <h2>PROSÍM OTOČTE TELEFON</h2>
    <p>Hra je určena pouze pro režim na výšku.</p>
</div>

<div id="login-overlay">
    <div class="login-box glass-panel">
        <h1 style="color:var(--neon); margin:0 0 10px 0;">NEON KNOT</h1>
        <p id="tut-t-1" style="font-size:12px; color:#aaa; margin-bottom:20px;">Obkresli vzor jedním tahem co nejpřesněji.</p>
        <input type="text" id="player-name-input" class="login-input" placeholder="Tvé jméno" maxlength="12">
        <button class="btn btn-challenge" style="width:100%" onclick="savePlayerName()" id="btn-start">START</button>
    </div>
</div>

<div id="photo-overlay" onclick="this.style.display='none'">
    <img id="photo-img" src="">
</div>

<canvas id="gameCanvas"></canvas>

<div id="side-menu">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 id="menu-user-name" style="color:var(--neon); margin:0;">Hráč</h2>
        <div style="font-size:30px;" onclick="toggleMenu()">✕</div>
    </div>
    
    <button class="btn btn-challenge" style="width:100%; margin-bottom: 30px;" onclick="shareGame()" id="btn-invite">POZVAT A ZÍSKAT TAH</button>
    
    <div style="font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">TOP 10 HRÁČŮ</div>
    <div id="friends-list"></div>
</div>

<div id="ui">
    <div id="top-row">
        <div id="menu-btn" class="glass-panel" onclick="toggleMenu()">☰</div>
        <div id="stats-bar" class="glass-panel">
            <div class="stat-item"><span class="stat-label" id="label-moves">Tahy</span><span id="moves-display" class="stat-value moves-count">0</span></div>
            <div class="stat-item"><span class="stat-label" id="label-best">Best</span><span id="best-display" class="stat-value">0%</span></div>
            <div class="stat-item"><span class="stat-label" id="label-streak">Dny</span><span id="streak-display" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label" id="label-global">Svět</span><span id="global-display" class="stat-value">0</span></div>
        </div>
    </div>

    <div id="result-container" class="glass-panel">
        <div id="score-display">0%</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-ok" onclick="resetBoard()" id="btn-again">ZNOVU</button>
            <button class="btn btn-challenge" onclick="shareGame()" id="btn-share">SDÍLET</button>
        </div>
    </div>

    <div id="reference-box"><canvas id="refCanvas" width="200" height="200"></canvas></div>

    <div id="lang-switcher">
        <div class="lang-btn" id="lang-cz" onclick="setLang('cz')">CZ</div>
        <div class="lang-btn" id="lang-en" onclick="setLang('en')">EN</div>
    </div>
</div>

<script>
    // Konfigurace Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Globální stav
    let userId = localStorage.getItem('neon_uid') || 'u' + Date.now();
    localStorage.setItem('neon_uid', userId);
    let userName = localStorage.getItem('neon_name');
    let moves = 0, streak = 0, bestScore = 0;
    let isDrawing = false, isFinished = false, playerTrace = [];
    const urlParams = new URLSearchParams(window.location.search);
    const refFromUrl = urlParams.get('ref');

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];

    // Jazyky
    let currentLang = localStorage.getItem('neon_lang') || 'cz';
    const texts = {
        cz: { moves: "Tahy", invite: "POZVAT KÁMOŠE (+1 TAH)", again: "Znovu", shareMsg: "Můj rekord je " },
        en: { moves: "Moves", invite: "INVITE FRIEND (+1 MOVE)", again: "Again", shareMsg: "My record is " }
    };

    function setLang(l) {
        currentLang = l;
        localStorage.setItem('neon_lang', l);
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === 'lang-'+l));
        document.getElementById('label-moves').innerText = texts[l].moves;
        document.getElementById('btn-invite').innerText = texts[l].invite;
        document.getElementById('btn-again').innerText = texts[l].again;
    }

    // Inicializace
    if (userName) {
        document.getElementById('login-overlay').style.display = 'none';
        setupUser();
    }

    function savePlayerName() {
        const input = document.getElementById('player-name-input').value.trim();
        if (input.length >= 2) {
            userName = input;
            localStorage.setItem('neon_name', userName);
            document.getElementById('login-overlay').style.display = 'none';
            
            // Prvotní zápis uživatele
            db.ref(`users/${userId}`).update({
                name: userName,
                invitedBy: (refFromUrl && refFromUrl !== userId) ? refFromUrl : null
            }).then(setupUser);
        }
    }

    function setupUser() {
        document.getElementById('menu-user-name').innerText = userName;
        
        // Sledování dat uživatele
        db.ref(`users/${userId}`).on('value', snap => {
            const d = snap.val() || {};
            moves = d.moves || 0;
            streak = d.streak || 0;
            bestScore = d.bestScore || 0;
            
            // Reset tahů o půlnoci
            const today = new Date().toLocaleDateString();
            if (d.lastDate !== today) {
                db.ref(`users/${userId}`).update({
                    moves: Math.max(moves, 1), // Každý den aspoň 1 tah
                    lastDate: today
                });
            }
            updateUI();
        });

        // Global tahy
        db.ref('global_moves').on('value', snap => {
            document.getElementById('global-display').innerText = snap.val() || 0;
        });

        // Žebříček (Top 10 unikátních)
        db.ref('users').orderByChild('bestScore').limitToLast(20).on('value', snap => {
            let arr = [];
            snap.forEach(child => { arr.push({id: child.key, ...child.val()}); });
            arr = arr.sort((a,b) => b.bestScore - a.bestScore).slice(0, 10);
            
            let html = '';
            arr.forEach(u => {
                html += `<div class="friend-row ${u.id === userId ? 'me' : ''}" onclick="viewPhoto('${u.id}')">
                    <span>${u.name}</span><b>${u.bestScore}%</b>
                </div>`;
            });
            document.getElementById('friends-list').innerHTML = html;
        });
    }

    function updateUI() {
        document.getElementById('moves-display').innerText = moves;
        document.getElementById('best-display').innerText = bestScore + "%";
        document.getElementById('streak-display').innerText = streak;
    }

    // Herní logika
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawRef();
    });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    canvas.addEventListener('touchstart', e => {
        if (moves <= 0 || isFinished) return;
        isDrawing = true;
        playerTrace = [];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        playerTrace.push({x: e.touches[0].clientX, y: e.touches[0].clientY});
    });

    canvas.addEventListener('touchmove', e => {
        if (!isDrawing) return;
        const t = e.touches[0];
        const last = playerTrace[playerTrace.length-1];
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4
