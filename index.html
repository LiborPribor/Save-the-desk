        canvas#gameCanvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        #stats-bar { display: flex; justify-content: space-between; pointer-events: auto; background: rgba(20,20,20,0.85); padding: 15px; border-radius: 15px; border: 1px solid #444; backdrop-filter: blur(10px); margin-top: env(safe-area-inset-top); }

        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 20px; font-weight: 900; color: #ff00ff; }

        #score-display { font-size: 90px; font-weight: 900; text-align: center; text-shadow: 0 0 30px #ff00ff; opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0.5); }
        #score-display.show { opacity: 1; transform: scale(1); }

        #chart-container { width: 100%; height: 100px; background: rgba(10,10,10,0.7); border-radius: 15px; pointer-events: auto; padding: 10px; box-sizing: border-box; border: 1px solid #333; margin-bottom: env(safe-area-inset-bottom); }
        
        #reference-box { position: absolute; top: 110px; right: 20px; width: 100px; height: 100px; border: 2px solid #ff00ff; border-radius: 15px; background: rgba(255, 0, 255, 0.05); display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #refCanvas { width: 80px; height: 80px; }
    </style>
</head>

<script>

    db.ref('global_draws').on('value', (s) => {
        document.getElementById('global-counter').innerText = s.val() || 0;
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    
    let playerTrace = [];
    let isDrawing = false;
    let localHistory = JSON.parse(localStorage.getItem('neon_v4_scores')) || [];

    // Cílový tvar: Neonový uzel
    const targetShape = [
        {x: 50, y: 10}, {x: 80, y: 40}, {x: 50, y: 50}, {x: 20, y: 60}, 
        {x: 50, y: 90}, {x: 80, y: 60}, {x: 50, y: 50}, {x: 20, y: 40}, {x: 50, y: 10}
    ];

    // --- GRAF ---
    const chartCtx = document.getElementById('progressChart').getContext('2d');
    let progressChart = new Chart(chartCtx, {
        type: 'line',
        data: {
            labels: localHistory.map((_, i) => i + 1),
            datasets: [{ data: localHistory, borderColor: '#ff00ff', tension: 0.4, pointRadius: 0, borderWidth: 2, fill: true, backgroundColor: 'rgba(255,0,255,0.05)' }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100, display: false }, x: { display: false } }, plugins: { legend: { display: false } } }
    });

    function normalize(points) {
        let minX = Math.min(...points.map(p => p.x)), maxX = Math.max(...points.map(p => p.x));
        let minY = Math.min(...points.map(p => p.y)), maxY = Math.max(...points.map(p => p.y));
        let width = maxX - minX, height = maxY - minY;
        let size = Math.max(width, height, 1);
        return points.map(p => ({
            x: ((p.x - minX) / size) * 80 + 10,
            y: ((p.y - minY) / size) * 80 + 10
        }));
    }

    // --- TO HODNOCENÍ, KTERÉ TI VYHOVOVALO ---
    function evaluate() {
        if (playerTrace.length < 15) return;
        
        const normPlayer = normalize(playerTrace);
        let diff = 0;
        let samples = 50; 
        
        for(let i=0; i<samples; i++) {
            let pIdx = Math.floor((i/(samples-1)) * (normPlayer.length-1));
            let tIdx = Math.floor((i/(samples-1)) * (targetShape.length-1));
            let d = Math.hypot(normPlayer[pIdx].x - targetShape[tIdx].x, normPlayer[pIdx].y - targetShape[tIdx].y);
            diff += d;
        }
        
        let score = Math.max(0, 100 - (diff / samples) * 2.8);
        
        // Penalizace za neuzavření
        const startEndDist = Math.hypot(normPlayer[0].x - normPlayer[normPlayer.length-1].x, normPlayer[0].y - normPlayer[normPlayer.length-1].y);
        if (startEndDist > 15) score -= 10;
        
        score = Math.round(Math.max(0, score));

        // Zobrazení UI
        scoreDisplay.innerText = score + "%";
        scoreDisplay.style.color = score > 80 ? '#00ffcc' : (score > 50 ? '#ffcc00' : '#ff0055');
        scoreDisplay.classList.add('show');

        // Uložení a odeslání
        localHistory.push(score);
        localStorage.setItem('neon_v4_scores', JSON.stringify(localHistory));
        db.ref('global_draws').transaction(c => (c || 0) + 1);
        db.ref('scores_log').push({ score: score, time: Date.now() });

        updateUI();
    }
