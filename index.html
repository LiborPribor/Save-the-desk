<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>NEON KNOT - PRECISION MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: sans-serif; color: #fff; touch-action: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .glass { background: rgba(20,20,20,0.8); backdrop-filter: blur(10px); border: 1px solid #444; border-radius: 15px; pointer-events: auto; }
        #stats { display: flex; justify-content: space-between; padding: 15px; margin-top: env(safe-area-inset-top); }
        #result { margin-top: 20px; text-align: center; display: none; padding: 20px; }
        #score-text { font-size: 64px; font-weight: 900; text-shadow: 0 0 20px #ff00ff; color: #fff; }
        .btn { background: #ff00ff; border: none; padding: 12px 25px; border-radius: 8px; color: #fff; font-weight: bold; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        #ref-container { position: absolute; top: 120px; right: 20px; width: 60px; height: 60px; border: 1px solid #ff00ff; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="stats" class="glass">
        <div><small style="color:#888">BEST</small><br><span id="best-score" style="color:#ff00ff; font-weight:bold">0%</span></div>
        <div style="text-align:right"><small style="color:#888">LEVEL</small><br><b>1</b></div>
    </div>

    <div id="result" class="glass">
        <div id="score-text">0%</div>
        <button class="btn" onclick="resetGame()">Zkusit znovu</button>
    </div>
</div>

<div id="ref-container"><canvas id="refCanvas" width="120" height="120"></canvas></div>

<script>
    // Tvůj Firebase config ponechán beze změny
    const firebaseConfig = {
        apiKey: "AIzaSyCnGuV53ZyxO1qU7G6zsVFqWuKPSndn_bQ",
        authDomain: "neon-desk.firebaseapp.com",
        databaseURL: "https://neon-desk-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "neon-desk",
        appId: "1:721167653862:web:36ca5e1022e348896c5427"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const uid = localStorage.getItem('neon_uid') || 'u' + Math.random().toString(36).substr(2, 5);
    localStorage.setItem('neon_uid', uid);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const targetShape = [{x:50,y:10},{x:85,y:40},{x:50,y:55},{x:15,y:70},{x:50,y:95},{x:85,y:70},{x:50,y:55},{x:15,y:40},{x:50,y:10}];
    const checkPoints = [{x:50,y:10},{x:85,y:40},{x:15,y:40},{x:50,y:95},{x:15,y:70},{x:85,y:70}];
    
    let path = [], drawing = false, finished = false;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // Funkce pro kreslení reference v rohu
    function drawRef() {
        const r = document.getElementById('refCanvas').getContext('2d');
        r.strokeStyle = '#ff00ff'; r.lineWidth = 4; r.lineJoin = 'round';
        r.beginPath(); targetShape.forEach((p, i) => { i===0 ? r.moveTo(p.x*1.2, p.y*1.2) : r.lineTo(p.x*1.2, p.y*1.2); });
        r.stroke();
    }
    drawRef();

    canvas.addEventListener('touchstart', e => {
        if(finished) return;
        drawing = true; path = [];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        addPoint(e.touches[0]);
    });

    canvas.addEventListener('touchmove', e => {
        if(!drawing) return;
        addPoint(e.touches[0]);
        drawPath();
    });

    canvas.addEventListener('touchend', () => {
        if(drawing && path.length > 10) evaluate();
        drawing = false;
    });

    function addPoint(t) { path.push({x: t.clientX, y: t.clientY}); }

    function drawPath() {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff';
        ctx.beginPath();
        path.forEach((p, i) => { i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
        ctx.stroke();
    }

    function evaluate() {
        finished = true;
        
        // 1. Zjistíme opsaný obdélník tahu
        const xs = path.map(p => p.x), ys = path.map(p => p.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const drawW = maxX - minX, drawH = maxY - minY;
        
        // Pokud je to moc malé (čmáranice), rovnou trest
        if (drawW < 100 || drawH < 100) { finishScore(Math.floor(Math.random()*15)); return; }

        const centerX = minX + drawW/2, centerY = minY + drawH/2;
        const scale = Math.max(drawW, drawH) / 80;

        // Normalizace hráčových bodů
        const normPath = path.map(p => ({
            x: (p.x - centerX) / scale + 50,
            y: (p.y - centerY) / scale + 50
        }));

        // 2. Kontrola checkpointů (MUSÍ tam být body)
        let hits = 0;
        checkPoints.forEach(cp => {
            const reached = normPath.some(p => Math.hypot(p.x - cp.x, p.y - cp.y) < 15);
            if(reached) hits++;
        });

        // 3. Výpočet geometrické přesnosti
        let totalDist = 0;
        normPath.forEach(p => {
            let minDist = Infinity;
            for(let i=0; i < targetShape.length-1; i++) {
                minDist = Math.min(minDist, distToSegment(p, targetShape[i], targetShape[i+1]));
            }
            totalDist += minDist;
        });

        let accuracy = 100 - (totalDist / normPath.length * 8);
        
        // KOMBINOVANÁ LOGIKA
        // Výrazně srazit body, pokud chybí rohy (checkpointy)
        let checkpointMultiplier = hits / checkPoints.length;
        let finalScore = accuracy * Math.pow(checkpointMultiplier, 2);

        // Trest za příliš dlouhou čáru (čmárání dokola)
        let pathLen = 0;
        for(let i=1; i<path.length; i++) pathLen += Math.hypot(path[i].x-path[i-1].x, path[i].y-path[i-1].y);
        if (pathLen > (drawW + drawH) * 5) finalScore *= 0.5;

        finishScore(Math.max(0, Math.round(finalScore)));
    }

    function distToSegment(p, v, w) {
        const l2 = Math.hypot(v.x-w.x, v.y-w.y)**2;
        if (l2 === 0) return Math.hypot(p.x-v.x, p.y-v.y);
        let t = ((p.x-v.x)*(w.x-v.x) + (p.y-v.y)*(w.y-v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t*(w.x-v.x)), p.y - (v.y + t*(w.y-v.y)));
    }

    function finishScore(s) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('score-text').innerText = s + "%";
        db.ref(`users/${uid}/bestScore`).transaction(current => Math.max(current || 0, s));
        db.ref(`users/${uid}/bestScore`).on('value', snap => {
            document.getElementById('best-score').innerText = (snap.val() || 0) + "%";
        });
    }

    function resetGame() {
        finished = false; path = [];
        ctx.clearRect(0,0,canvas.width, canvas.height);
        document.getElementById('result').style.display = 'none';
    }
</script>
</body>
</html>
